# ABA conda environment — the single most-important file in the Mac install.
#
# Fetched at install time by the create-env playbook step and fed to
# micromamba (see helper/src/aba_installer/install.yml). Everything ABA
# needs to run lives here: the Python + R + Node toolchains, the
# single-cell bio stack the agent executes, the Jupyter kernels it runs
# code in, and the backend's own runtime deps.
#
# Channels, in priority order:
#   conda-forge — the C-library base + most scientific Python + R-base
#   bioconda    — Bioconductor packages (the binary source for Bioc on Mac;
#                 PPM has CRAN binaries but no Bioc — see mac-install.md §8.2)
#
# Pin policy: pin the language toolchains (python/r/node) to a minor series
# so updates stay predictable; leave the bio stack with floors (>=) so the
# solver can pick a mutually-compatible set per arch. Once validated on a
# fresh arm64 + x86_64 Mac, capture the resolved versions as a locked
# snapshot. Refresh monthly (mac-install.md §4).

name: aba
channels:
  - conda-forge
  - bioconda

dependencies:
  # ── language toolchains ────────────────────────────────────────────────
  # R is NOT here — it lives in a separate conda "tools env" (see
  # r-environment.yml), so Python and R stay decoupled (matching the Linux
  # deploy): bumping R can't touch the Python env and vice-versa.
  - python=3.12.*
  - nodejs=20.*
  - pip

  # ── native libraries + build helpers (binary; nothing compiles at install)
  - hdf5
  - pkg-config
  - cmake

  # ── scientific Python core ─────────────────────────────────────────────
  - numpy
  - pandas
  - scipy
  - matplotlib-base
  - scikit-learn
  - h5py
  - pyyaml          # backend: `import yaml` (config, playbook, agent specs)
  - tabulate        # pandas.DataFrame.to_markdown() backend (ctx_read + describe tools)

  # ── single-cell bio stack (the agent imports these in Python kernels) ──
  - anndata>=0.10
  - scanpy>=1.10
  - scvi-tools>=1.1
  - leidenalg
  - python-igraph

  # ── Python Jupyter kernel (the agent runs Python here). R has its own
  #    kernel in the tools env — see r-environment.yml. jupyter_client also
  #    provides the `jupyter` CLI the R kernel registration shells out to. ──
  - jupyter_client
  - ipykernel
  - nbformat
  - nbconvert

  # ── document / report tooling ──────────────────────────────────────────
  - typst

  # ── frontend package manager (the build step calls $ENV_DIR/bin/pnpm) ──
  - pnpm

  # ── backend runtime — pure-python / arm64 wheels, kept in a pip section
  #    so they don't constrain the heavier conda solve above. ────────────
  - pip:
      - fastapi
      - uvicorn[standard]
      - python-multipart   # FastAPI UploadFile/File/Form on the upload routes
      - anthropic
      # anthropic's AsyncClient runs over HTTP/2 (see core/llm.py); without
      # httpx[http2]'s h2 extras every chat turn dies with `ImportError: ...
      # 'h2' package is not installed`. Pin to the [http2] extra so the dep
      # set is explicit even though `anthropic` pulls in plain `httpx`.
      - httpx[http2]
      - mcp
      - pydantic
      - python-dotenv
      - pypdfium2
      - pillow

      # ── viewer data layer ──────────────────────────────────────────────
      # lstar-sc: L* model + Zarr interchange for single-cell (import name is
      # `lstar`; the bare `lstar` on PyPI is an UNRELATED automata library —
      # always install `lstar-sc`). Powers the pagoda3 viewer's .h5ad →
      # .lstar.zarr conversion (misc/pagoda3_integration.md). Ships a compiled
      # C++ core: prebuilt wheels exist for macOS arm64 (cp312); on other
      # platforms pip builds from source (cmake + pybind11 — cmake is above).
      # Floor at 0.1.4: earlier releases predate the single-file .lstar.zarr.zip
      # (STORED, range-readable) support + the store-format the current pagoda3
      # expects, and 0.1.2 also shipped the macOS-arm64 dup-libomp SIGSEGV.
      # NOTE: 0.1.4 is not on PyPI yet — until it lands, dev/deploys must install
      # lstar from the `lstar` repo main (pip install <lstar-checkout>); this pin
      # will only resolve from PyPI once 0.1.4 is published.
      - lstar-sc>=0.1.4
