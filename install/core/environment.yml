# ABA conda environment — the CONTROLLER/platform env (the aba backend itself).
#
# Fetched at install time by the create-env playbook step and fed to
# micromamba (see helper/src/aba_installer/install.yml). This holds what the aba
# PLATFORM needs to run: the Python + Node toolchains, the Jupyter kernel-client
# machinery, document tooling, and the backend's own runtime deps.
#
# It NO LONGER holds the single-cell science stack (scanpy/scvi-tools/anndata/
# leiden/…) NOR the viewer data layer (lstar-sc/zarr/scipy): weft owns environment
# realization now, so the agent runs analysis in weft SESSION kernels backed by
# content-addressed packs (install/core/envs/python_bio.yaml), and the backend
# subprocesses the SESSION python for .lstar.zarr conversion / serves stores as raw
# bytes — it never imports the science or viewer stack in-process (W3.4 — slim
# controller). The only heavy lib kept is pandas (+ its numpy), which the BACKEND
# itself imports for to_markdown. R lives in its own tools env (r-environment.yml).
#
# Channels, in priority order:
#   conda-forge — the C-library base + scientific Python + node
#   bioconda    — kept for parity with the R tools env's Bioconductor pulls
#                 (see r-environment.yml + mac-install.md §8.2)
#
# Pin policy: pin the language toolchains (python/node) to a minor series so
# updates stay predictable. Once validated on a fresh arm64 + x86_64 Mac,
# capture the resolved versions as a locked snapshot. Refresh monthly
# (mac-install.md §4).

name: aba
channels:
  - conda-forge
  - bioconda

dependencies:
  # ── language toolchains ────────────────────────────────────────────────
  # R is NOT here — it lives in a separate conda "tools env" (see
  # r-environment.yml), so Python and R stay decoupled (matching the Linux
  # deploy): bumping R can't touch the Python env and vice-versa.
  - python=3.12.*
  - nodejs=20.*
  - pip

  # ── native libraries + build helpers (binary; nothing compiles at install)
  - pkg-config
  - cmake

  # ── backend numeric deps ───────────────────────────────────────────────
  # NOT the science / viewer stack (weft-owned — see header): only what the BACKEND
  # process itself imports. pandas backs ctx_read/describe/orientation to_markdown;
  # numpy rides with it. That is the whole heavy footprint now — scipy/lstar-sc/zarr
  # moved to the weft python pack too (install/core/envs/python_bio.yaml). The web
  # process subprocesses the SESSION python for .lstar.zarr conversion and serves
  # store files as RAW bytes over HTTP Range, so it never imports scipy/zarr/lstar
  # in-process. numpy keeps a conservative <2.5 bound (known-good for pandas) — the
  # numba driver that set it left with scanpy/scvi.
  - numpy<2.5
  - pandas
  - pyyaml          # backend: `import yaml` (config, playbook, agent specs)
  - tabulate        # pandas.DataFrame.to_markdown() backend (ctx_read + describe tools)

  # ── Python Jupyter kernel (the agent runs Python here). R has its own
  #    kernel in the tools env — see r-environment.yml. jupyter_client also
  #    provides the `jupyter` CLI the R kernel registration shells out to. ──
  - jupyter_client
  - ipykernel
  - nbformat
  - nbconvert

  # ── document / report tooling ──────────────────────────────────────────
  - typst

  # ── frontend package manager (the build step calls $ENV_DIR/bin/pnpm) ──
  - pnpm

  # ── backend runtime — pure-python / arm64 wheels, kept in a pip section
  #    so they don't constrain the heavier conda solve above. ────────────
  - pip:
      - fastapi
      - uvicorn[standard]
      - python-multipart   # FastAPI UploadFile/File/Form on the upload routes
      - anthropic
      - openai        # OpenAI/Codex provider (core/runtime/llm_runtime_openai.py):
                      # api.openai.com ChatCompletions + the ChatGPT/Codex Responses API
      # anthropic's AsyncClient runs over HTTP/2 (see core/llm.py); without
      # httpx[http2]'s h2 extras every chat turn dies with `ImportError: ...
      # 'h2' package is not installed`. Pin to the [http2] extra so the dep
      # set is explicit even though `anthropic` pulls in plain `httpx`.
      - httpx[http2]
      - mcp
      - pydantic
      - python-dotenv
      - pypdfium2
      - pillow
      # NB the viewer data layer (lstar-sc + zarr) is NOT here — it moved to the weft
      # python pack (install/core/envs/python_bio.yaml). The backend converts stores by
      # subprocessing the SESSION python and serves .lstar.zarr as raw bytes, so it
      # needs neither in-process. The toggleable viewer-pagoda3 module is just the dist.
