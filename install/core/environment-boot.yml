# ABA BOOT environment — the minimal base that lets the SERVER start under the
# `staged` prewarm strategy (ABA_ENV_PREWARM=staged; see misc/lazy_env_init.md).
#
# Strict SUBSET of environment.yml: language toolchains + the numeric core
# (numpy/pandas) + the backend runtime + the Jupyter kernel-client — enough to
# serve the UI and run data-management + light Python. What `micromamba env update
# -f environment.yml` adds afterwards is now only build helpers + typst — the
# single-cell science + viewer stack (scanpy/scvi/anndata/lstar-sc/zarr/scipy) is
# weft-owned, realized in SESSION kernels/packs, NOT installed into this base
# (W3.4). So the completed base is the SAME end state as the eager build.
#
# Drift guard: install/core/helper/tests/test_env_boot_subset.py asserts this is a
# subset of environment.yml (same pins) and that the pip: section is identical.
# Edit the tiering here and keep that test green. The pip: block must stay
# byte-for-byte the same list as environment.yml's (it is ALL boot-tier).

name: aba
channels:
  - conda-forge
  - bioconda

dependencies:
  # ── language toolchains (+ frontend build) ─────────────────────────────
  - python=3.12.*
  - nodejs=20.*
  - pip
  - pnpm

  # ── numeric core — pandas + numpy cover the backend's own imports (data
  #    management + to_markdown). scipy/lstar/zarr are pack-owned, not here. ──
  # Pin numpy<2.5 to match environment.yml (a known-good numpy for pandas) so the
  # boot base never starts on a numpy the full env update would have to walk back.
  - numpy<2.5
  - pandas
  - pyyaml          # backend: `import yaml`
  - tabulate        # pandas.DataFrame.to_markdown() (ctx_read + describe tools)

  # ── Jupyter kernel CLIENT only — the KernelManager (jupyter_client) the backend
  #    uses to talk to kernels + the `jupyter kernelspec` CLI. The kernel PROCESS
  #    runs ipykernel from the weft SESSION python (pack), not here. ──
  - jupyter_client

  # ── backend runtime — IDENTICAL to environment.yml's pip: section (every entry
  #    is platform-CORE). Keep in lock-step. The viewer data layer (lstar-sc/zarr)
  #    is NOT here — it moved to the weft python pack (python_bio.yaml). ──
  - pip:
      - fastapi
      - uvicorn[standard]
      - python-multipart
      - anthropic
      - openai
      - httpx[http2]
      - mcp
      - pydantic
      - python-dotenv
      - pypdfium2
      - pillow
