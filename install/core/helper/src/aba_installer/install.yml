# ABA install playbook — the deterministic sequence of steps to install
# ABA on a fresh Mac. The control API executes these in order; the agent
# (H8) reads the same file when surfaced for failure diagnosis.
#
# Variables substituted at run time: ABA_HOME, ENV_DIR, REPO_DIR.
# (Arch is computed inline as $(uname -m) where needed — env_vars are
# expanded with plain variable substitution, not shell command sub.)

defaults:
  timeout_seconds: 300

env_vars:
  ABA_HOME: "$HOME/.aba"
  ENV_DIR: "$ABA_HOME/env"
  REPO_DIR: "$ABA_HOME/repo"
  # Sources can be overridden from the environment (the defaults are inlined
  # into the commands as ${VAR:-default}, NOT set here — env_vars would
  # clobber an exported override):
  #   ABA_ENV_YML_URL / ABA_REPO_URL / ABA_RECIPES_URL — fetch/clone from a
  #     different URL (e.g. git@github.com:… for SSH while the repos are private).
  #   ABA_ENV_YML_SRC / ABA_REPO_SRC / ABA_RECIPES_SRC — install from a local
  #     path (working tree / offline mirror) instead of fetching. Used by the
  #     smoke harness to test un-pushed changes.
  #   ABA_REF / RECIPES_REF — pin the aba / recipe-pack checkout to a branch, TAG,
  #     or commit (default: main). Tags/branches are clean; a bare commit SHA works
  #     via a full-clone fallback. Pin to a TAG for reproducible deploys (mirrors
  #     the lstar-sc / lstar-R / pagoda3 version pins). Ignored on the *_SRC path
  #     (a local working tree has no ref to resolve). This is the ONE pin knob —
  #     the Mac bootstrap (install/mac/setup.command) accepts ABA_REPO_BRANCH /
  #     ABA_RECIPES_BRANCH as back-compat aliases; prefer ABA_REF / RECIPES_REF.
  #     To keep a pin across `aba update`, set it in ~/.aba/config.env.
  #   ABA_ENV_PREWARM — env-build strategy (a deploy-profile knob, like
  #     ABA_ACCELERATOR; lives in config.env). `eager` (default): build the FULL
  #     base (+ the R tools env) BEFORE starting the server — right for
  #     shared/OOD/cluster/read-only-image deploys (one build, warm cache, many
  #     users). `staged`: create a minimal BOOT base, start the server, then finish
  #     the scientific Python stack (T1 bio, then T2 scvi/torch) + the R env in the
  #     background while the user works — personal mac / linux `local`. See
  #     misc/lazy_env_init.md. Personal installers write `staged`; shared installers
  #     write/leave `eager`. Absent/empty ⇒ eager (== current behavior).
  # Deploy-profile knobs (ABA_ACCELERATOR, ABA_ENV_PREWARM) are config.env lines
  # written by the installer per profile (see docs/arch/envs.md). Otherwise no
  # install knobs: the viewer stack (lstar-sc, lstar-R, pagoda3 dist) is
  # version-pinned in its own manifests, and paths like the pagoda3 dist and the
  # tools-env Rscript are DERIVED at runtime — don't add a knob for a derivable value.

steps:
  - id: preflight
    title: Pre-flight system check
    why: Confirm the OS, arch, required tools (git/curl), and free disk before doing anything.
    commands:
      - 'command -v git  >/dev/null 2>&1 || { echo "MISSING: git";  exit 1; }'
      - 'command -v curl >/dev/null 2>&1 || { echo "MISSING: curl"; exit 1; }'
      - 'case "$(uname -s)" in Darwin) sw_vers -productVersion 2>/dev/null; xcode-select -p >/dev/null 2>&1 || { echo "MISSING: Xcode Command Line Tools"; exit 1; };; Linux) sh -c ". /etc/os-release 2>/dev/null; echo \"OS: ${PRETTY_NAME:-Linux}\""; { command -v cc >/dev/null 2>&1 || command -v gcc >/dev/null 2>&1; } || echo "NOTE: no C compiler (cc/gcc) — only needed if a package source-builds";; esac'
      - 'echo "arch: $(uname -m)"; df -h "$HOME" | tail -1'
    timeout_seconds: 30
    remediation: |
      A prerequisite is missing (see "MISSING:" above). Install it, then re-run:
        • git / curl  → your package manager (Debian/Ubuntu: sudo apt install git curl;
          Fedora/RHEL: sudo dnf install git curl; macOS: brew install git).
        • macOS Xcode Command Line Tools → xcode-select --install.

  - id: install-micromamba
    title: Install micromamba
    why: Manages the isolated Python + R environment. ~20 MB binary, no admin needed.
    commands:
      - 'mkdir -p "$ABA_HOME/bin"'
      # OS/arch-aware platform (the one micromamba seam): osx-<arch> on macOS,
      # linux-64 / linux-aarch64 on Linux. Override with ABA_MAMBA_PLATFORM.
      # Leading-paren case patterns ( (Darwin/*) … ) are required: under
      # /bin/sh an unparenthesized pattern's ')' prematurely closes the
      # enclosing $( … ) command substitution, mangling PLATFORM.
      - 'PLATFORM="${ABA_MAMBA_PLATFORM:-$(case "$(uname -s)/$(uname -m)" in (Darwin/*) echo "osx-$(uname -m)";; (Linux/aarch64|Linux/arm64) echo "linux-aarch64";; (Linux/*) echo "linux-64";; (*) echo "linux-64";; esac)}"; if [ -x "$ABA_HOME/bin/micromamba" ]; then echo "micromamba already installed"; else echo "platform: $PLATFORM"; curl -fsSL "https://micro.mamba.pm/api/micromamba/$PLATFORM/latest" | tar -xj -C "$ABA_HOME" bin/micromamba; fi'
      - '"$ABA_HOME/bin/micromamba" --version'
    timeout_seconds: 120
    remediation: |
      micromamba download/extract failed. Check network access to micro.mamba.pm;
      if arch detection was wrong, set ABA_MAMBA_PLATFORM (linux-64 /
      linux-aarch64 / osx-arm64 / osx-64), then re-run.

  - id: create-env
    title: Create the conda environment
    why: |
      Installs Python 3.12, R 4.4, Node 20, and the bio dependencies
      (anndata, scanpy, scvi-tools, deseq2, edger, seurat, ...). Largest
      step — ~9 minutes on a typical connection.
    commands:
      # Prefer an explicit override, then the env.yml from the cloned repo
      # (the common case — setup.command already cloned it), then a URL fetch.
      - 'if [ -n "${ABA_ENV_YML_SRC:-}" ]; then cp "$ABA_ENV_YML_SRC" "$ABA_HOME/environment.yml"; elif [ -f "$REPO_DIR/aba/install/core/environment.yml" ]; then cp "$REPO_DIR/aba/install/core/environment.yml" "$ABA_HOME/environment.yml"; else curl -fsSLo "$ABA_HOME/environment.yml" "${ABA_ENV_YML_URL:-https://raw.githubusercontent.com/kharchenkolab/aba/main/install/core/environment.yml}"; fi'
      # Staged prewarm also needs the minimal BOOT manifest (the create step below
      # picks it when ABA_ENV_PREWARM=staged). Non-fatal if absent — create falls
      # back to the full manifest.
      - 'if [ -f "$REPO_DIR/aba/install/core/environment-boot.yml" ]; then cp "$REPO_DIR/aba/install/core/environment-boot.yml" "$ABA_HOME/environment-boot.yml"; elif [ "${ABA_ENV_PREWARM:-eager}" = staged ]; then curl -fsSLo "$ABA_HOME/environment-boot.yml" "${ABA_ENV_BOOT_YML_URL:-https://raw.githubusercontent.com/kharchenkolab/aba/main/install/core/environment-boot.yml}" || echo "no boot manifest available — will build the full base"; fi'
      # Deployment-conditional base: when config.env declares ABA_ACCELERATOR=cuda, inject
      # the GPU torch pin so scvi-tools resolves the CUDA build (else conda-forge picks the
      # CPU-only default and GPU jobs silently run on CPU). No-op for a CPU deployment.
      - 'if [ -f "$REPO_DIR/aba/install/core/inject-accelerator.sh" ]; then bash "$REPO_DIR/aba/install/core/inject-accelerator.sh" "$ABA_HOME/environment.yml"; fi'
      # Idempotent + self-healing. Marker is env/bin/uvicorn (pip-installed at
      # the very end) so a half-built env from an interrupted prewarm is NOT
      # mistaken for complete — we wipe and rebuild it (the package cache makes
      # that fast). conda-meta would appear before the pip layer and skip a
      # broken env, leaving "uvicorn: No such file or directory" at start.
      # --channel-priority strict: with a conda-forge + bioconda mix, strict
      # priority keeps the solver from exploring lower-priority channels for
      # packages conda-forge already satisfies — a large solve speedup (and the
      # correct, deterministic resolution). micromamba 2.x does not default to it.
      # CONDA_OVERRIDE_CUDA (cuda base only): the install/build node has no GPU, so
      # micromamba can't detect the `__cuda` virtual package from a driver — and
      # every conda-forge `pytorch=*=cuda*` build requires `__cuda`. Without the
      # override the solver rejects all CUDA builds and backtracks to non-existent
      # ancient ones ("Could not solve"). Spoofing __cuda lets a GPU-less node build
      # the GPU base; its value also selects the CUDA major (12.x → cuda12x build,
      # 11.8 → cuda118). Node-independent: the actual GPU is verified at job time
      # (gpu_capability_ok in slurm_entry). Admin override: ABA_CUDA_VERSION.
      # Default 11.8 (cuda118) is the widest-compatibility choice: runs on any driver
      # >= 450.80 and covers GPUs sm_60 (P100) .. sm_90 (H100). A 12.x runtime needs a
      # driver supporting CUDA 12 (>= R525); it does run on an older 12.x driver via CUDA
      # minor-version compatibility (verified: cuda126 works on our R535/CUDA-12.2 P100
      # nodes) but not on R450-R520 clusters. 11.8 keeps the widest driver floor and
      # avoids depending on minor-version compat. Set ABA_CUDA_VERSION=12 for the newer
      # runtime on a R525+ cluster; a future install-time probe will auto-pick.
      # PYTHONNOUSERSITE=1 + PIP_USER=0: run the env build (incl. its pip: section)
      # BLIND to the user's ~/.local. Without it, a pip package already in ~/.local
      # (e.g. a stray `pip install --user`, or a prior leaked ABA build) shadows the
      # env: micromamba's pip step sees it "already satisfied" and skips installing
      # it into the env, so env/bin/uvicorn is never created, start-backend fails,
      # and the installer loops rebuilding forever. Keep in lock-step with update.yml.
      # Staged (ABA_ENV_PREWARM=staged) builds the minimal BOOT base so the server
      # starts fast; complete-base-env finishes the full stack afterwards. Eager
      # builds the full environment.yml up front (unchanged behaviour). Writes a
      # `.aba-base-stage` marker (boot|completing|ready) that gates the backend's
      # base self-heal + the kernel import-wait (misc/lazy_env_init.md). Staged with
      # no boot manifest falls back to the full build (stage=ready).
      - 'MANIFEST="$ABA_HOME/environment.yml"; STAGE=ready; if [ "${ABA_ENV_PREWARM:-eager}" = staged ] && [ -f "$ABA_HOME/environment-boot.yml" ]; then MANIFEST="$ABA_HOME/environment-boot.yml"; STAGE=boot; fi; if [ -x "$ENV_DIR/bin/uvicorn" ]; then echo "environment already present — skipping create"; else rm -rf "$ENV_DIR"; if [ "${ABA_ACCELERATOR:-cpu}" = "cuda" ]; then export CONDA_OVERRIDE_CUDA="${ABA_CUDA_VERSION:-11.8}"; echo "[accelerator] CUDA base: CONDA_OVERRIDE_CUDA=$CONDA_OVERRIDE_CUDA (satisfies __cuda on a GPU-less build node)"; fi; PYTHONNOUSERSITE=1 PIP_USER=0 "$ABA_HOME/bin/micromamba" create -y -v --channel-priority strict -p "$ENV_DIR" -f "$MANIFEST" && printf "%s" "$STAGE" > "$ENV_DIR/.aba-base-stage" && echo "[env] built base from $(basename "$MANIFEST") (stage=$STAGE)"; fi'
    timeout_seconds: 1200
    remediation: |
      The conda solve/build failed — usually a network/channel hiccup or low
      disk. The env auto-rebuilds on the next run (the package cache makes that
      fast). Check ~10-12 GB free in $HOME and that conda-forge/bioconda are
      reachable, then re-run.

  - id: clone-repos
    title: Clone aba + aba-recipe-pack
    why: Source for the backend, the frontend, and the recipe library.
    commands:
      - 'mkdir -p "$REPO_DIR"'
      # ABA_REF / RECIPES_REF (default main) pin the clone to a branch / tag / commit.
      # Shallow --branch works for a branch or tag; a bare commit SHA falls back to a
      # full clone + checkout (shallow ref-fetch of an arbitrary SHA isn't portable).
      - 'if [ -d "$REPO_DIR/aba" ]; then :; elif [ -n "${ABA_REPO_SRC:-}" ]; then mkdir -p "$REPO_DIR/aba" && rsync -a --exclude .envs_cache --exclude _runs --exclude reports --exclude .git --exclude .venv --exclude node_modules --exclude dist --exclude __pycache__ "$ABA_REPO_SRC/" "$REPO_DIR/aba/"; else R="${ABA_REF:-main}"; U="${ABA_REPO_URL:-https://github.com/kharchenkolab/aba}"; git clone --depth 1 --branch "$R" "$U" "$REPO_DIR/aba" 2>/dev/null || { git clone "$U" "$REPO_DIR/aba" && git --git-dir="$REPO_DIR/aba/.git" --work-tree="$REPO_DIR/aba" checkout "$R"; }; fi'
      - 'if [ -d "$REPO_DIR/aba-recipe-pack" ]; then :; elif [ -n "${ABA_RECIPES_SRC:-}" ]; then mkdir -p "$REPO_DIR/aba-recipe-pack" && rsync -a --exclude .envs_cache --exclude _runs --exclude reports --exclude .git --exclude __pycache__ "$ABA_RECIPES_SRC/" "$REPO_DIR/aba-recipe-pack/"; else R="${RECIPES_REF:-main}"; U="${ABA_RECIPES_URL:-https://github.com/kharchenkolab/aba-recipe-pack}"; git clone --depth 1 --branch "$R" "$U" "$REPO_DIR/aba-recipe-pack" 2>/dev/null || { git clone "$U" "$REPO_DIR/aba-recipe-pack" && git --git-dir="$REPO_DIR/aba-recipe-pack/.git" --work-tree="$REPO_DIR/aba-recipe-pack" checkout "$R"; }; fi'
    timeout_seconds: 120
    remediation: |
      git clone failed — most often a private-repo access issue. Use SSH:
      ABA_REPO_URL=git@github.com:kharchenkolab/aba.git (+ ABA_RECIPES_URL for the
      pack), or install from a local checkout offline with ABA_REPO_SRC=/path/to/aba
      (and ABA_RECIPES_SRC=/path/to/aba-recipe-pack), then re-run.

  - id: import-recipes
    title: Import the recipe pack
    why: |
      Map the cloned recipe pack into the installation-scope bundle the backend
      actually reads ($ABA_HOME/installation): recipes/<domain>/ →
      skills/recipes/<domain>/, catalog/*.yaml → catalog/, and knowhow/ →
      knowhow/ (the docs recipes cross-link to AND knowhow/refsources/ — the
      fetch_reference provider catalog the loader composes). Without this the
      pack sits on disk unused and the agent sees only the ~9 system skills.
      Idempotent + always re-copied (it's kilobytes), so an update refreshes it.
    commands:
      - 'PACK="$REPO_DIR/aba-recipe-pack"; INST="$ABA_HOME/installation"; mkdir -p "$INST/skills/recipes" "$INST/catalog" "$INST/knowhow"; if [ -d "$PACK/recipes" ]; then cp -R "$PACK/recipes/." "$INST/skills/recipes/"; fi; if ls "$PACK"/catalog/*.yaml >/dev/null 2>&1; then cp "$PACK"/catalog/*.yaml "$INST/catalog/"; fi; if [ -d "$PACK/knowhow" ]; then cp -R "$PACK/knowhow/." "$INST/knowhow/"; fi'
      - 'echo "imported $(find "$ABA_HOME/installation/skills/recipes" -name "*.md" 2>/dev/null | wc -l | tr -d " ") recipe files + $(ls "$ABA_HOME/installation/catalog"/*.yaml 2>/dev/null | wc -l | tr -d " ") catalog files + $(ls "$ABA_HOME/installation/knowhow/refsources"/*.yaml 2>/dev/null | wc -l | tr -d " ") refsource providers into $ABA_HOME/installation"'
    timeout_seconds: 60
    remediation: |
      Importing the recipe pack failed — usually $ABA_HOME/repo/aba-recipe-pack
      is missing or incomplete. Confirm that directory exists (re-run the clone
      step if not), check $HOME has free space, then re-run.

  - id: create-r-tools-env
    title: Build the R toolchain
    why: |
      Pre-builds R + IRkernel + Seurat/Bioconductor into the backend's tools
      env ($ABA_RUNTIME_DIR/envs/tools) so the agent's R work uses it directly,
      instead of the slow Bioconductor-scale solve the backend would otherwise
      run on first R use. Kept separate from the Python env so the two stay
      decoupled (see r-environment.yml). Non-fatal: if it fails, Python still
      works and the backend falls back to provisioning R on demand. Marker is
      Seurat (a late, heavy package) so a half-built env rebuilds rather than
      being mistaken for complete.
    commands:
      # Staged prewarm DEFERS the eager R build: the backend background-provisions the
      # R tools env at server start (lifespan._provision_r_base_bg), in parallel with
      # the Python completion. Eager builds it here up front (unchanged).
      - 'if [ "${ABA_ENV_PREWARM:-eager}" = staged ]; then echo "staged: R tools env deferred to complete-r-env (after server start)"; else TOOLS_ENV="${ABA_RUNTIME_DIR:-$ABA_HOME/runtime}/envs/tools"; RYML="${ABA_R_ENV_YML_SRC:-$REPO_DIR/aba/install/core/r-environment.yml}"; if [ -x "$TOOLS_ENV/bin/Rscript" ] && [ -d "$TOOLS_ENV/lib/R/library/Seurat" ]; then echo "R tools env already present — skipping"; else rm -rf "$TOOLS_ENV"; mkdir -p "$(dirname "$TOOLS_ENV")" && { "$ABA_HOME/bin/micromamba" create -y -v --channel-priority strict -p "$TOOLS_ENV" -f "$RYML" || echo "WARNING: R tools env build failed; the backend will provision R on demand"; }; fi; fi'
    timeout_seconds: 1800
    remediation: |
      The R toolchain build failed — this is NON-FATAL: ABA still runs and the
      backend provisions R on demand the first time it's needed. To pre-build it
      now, ensure conda-forge/bioconda are reachable and ~5 GB is free, then
      re-run.

  - id: install-lstar-r
    title: Install the lstar R viewer bridge
    why: |
      The pagoda3 viewer opens Seurat / SingleCellExperiment `.rds` results by
      bridging through the tools env's Rscript, which needs the lstar R package.
      It is NOT on CRAN (lstar moves fast); we pin a git tag (authoritative in
      `install-lstar-r.sh`) — the SAME release moment as the Python `lstar-sc`
      (same repo, `subdir=r`) and the pagoda3 dist, so writer/reader/store-format
      stay a matched set. Bump those pins together. Source-compiles (cpp11), so the
      conda compiler must be on PATH (the tools env ships it). Non-fatal: without it
      `.h5ad` / `.lstar.zarr` viewing still works; only `.rds` conversion degrades.
    commands:
      # Delegates to the shared install/core/install-lstar-r.sh — pin, idempotency
      # (RemoteRef, not packageVersion) and non-fatal semantics all live there, so the
      # installers and the SIF builders never drift. Guarded: a stale checkout that
      # predates the helper just skips (the step stays non-fatal either way).
      # Staged prewarm defers this with the R env (installed on demand at first .rds
      # view). Eager installs it up front (unchanged).
      - 'if [ "${ABA_ENV_PREWARM:-eager}" = staged ]; then echo "staged: lstar R viewer bridge deferred to complete-r-env (after server start)"; else H="$REPO_DIR/aba/install/core/install-lstar-r.sh"; if [ -f "$H" ]; then bash "$H" "${ABA_RUNTIME_DIR:-$ABA_HOME/runtime}/envs/tools" "$ABA_HOME/bin/micromamba"; else echo "no install-lstar-r.sh (stale checkout) — skipping lstar R"; fi; fi'
    timeout_seconds: 900
    remediation: |
      lstar R install failed — NON-FATAL. The viewer still opens `.h5ad` and
      `.lstar.zarr`; only Seurat/SCE `.rds` conversion is affected. To install by
      hand: with the tools env's bin on PATH (for the compiler), run its Rscript:
      `remotes::install_github("kharchenkolab/lstar", ref="v0.2.1", subdir="r")`.

  - id: fetch-pagoda3-dist
    title: Install the pagoda3 viewer bundle
    why: |
      pagoda3 is a static web app ABA serves under /pagoda3. We grab the PRE-BUILT
      viewer dist attached to the pagoda3 GitHub release (built once, on node >= 22,
      and published as a release asset — so no node/glibc toolchain is needed here;
      old-glibc hosts can't build it). The backend mounts /pagoda3 only if the dist
      is present, so without this the interactive viewer is silently unavailable
      (conversion still works; only the interactive view is gated). node >= 22 is
      needed only for the OPTIONAL runtime viewer-optimize (prep.ts) — without it the
      viewer still opens, just un-optimized. Override the asset URL with
      $ABA_PAGODA3_DIST_URL (air-gapped mirror / a newer pin). Non-fatal.
    commands:
      # Version-aware: the target URL is recorded in a .aba-dist-url marker, so a
      # version bump (v0.2.0 → v0.2.1 …) re-fetches on `aba update` instead of
      # skipping on "index.html present". Extract to a temp dir + atomic swap so a
      # failed download keeps the working dist (viewer never goes dark mid-update).
      # KEEP BYTE-IDENTICAL to update.yml's copy.
      - "DIST=\"$ABA_HOME/vendor/pagoda3/dist\"; URL=\"${ABA_PAGODA3_DIST_URL:-https://github.com/kharchenkolab/pagoda3/releases/download/v0.2.1/pagoda3-viewer-0.2.1.zip}\"; MARK=\"$DIST/.aba-dist-url\"; if [ -f \"$DIST/index.html\" ] && [ \"$(cat \"$MARK\" 2>/dev/null)\" = \"$URL\" ]; then echo \"pagoda3 dist already present ($URL) — skipping\"; elif ! command -v unzip >/dev/null 2>&1; then echo \"WARNING: unzip not found — cannot install pagoda3 dist ($URL)\"; else TMP=\"$(mktemp -d)\"; if curl -fsSL \"$URL\" -o \"$TMP/pg3.zip\" && unzip -q -o \"$TMP/pg3.zip\" -d \"$TMP/x\" && [ -f \"$TMP/x/index.html\" ]; then rm -rf \"$DIST\"; mkdir -p \"$(dirname \"$DIST\")\"; mv \"$TMP/x\" \"$DIST\"; printf '%s' \"$URL\" > \"$MARK\"; echo \"pagoda3 viewer dist installed to $DIST ($URL)\"; else echo \"WARNING: pagoda3 dist fetch/unzip failed ($URL; needs curl+unzip) — keeping any existing dist; interactive viewer needs a dist with index.html at $DIST\"; fi; rm -rf \"$TMP\"; fi"
    timeout_seconds: 300
    remediation: |
      pagoda3 dist fetch failed — NON-FATAL; the interactive viewer won't work until a
      dist with index.html at its root sits at $ABA_HOME/vendor/pagoda3/dist. Needs
      `curl` + `unzip`. The default asset is the pagoda3-viewer-<ver>.zip on the GitHub
      release (index.html at the zip root); set $ABA_PAGODA3_DIST_URL to a reachable
      mirror / newer pin, or unzip a built dist there by hand, then re-run.

  - id: build-frontend
    title: Build the interface
    why: |
      One-shot frontend build into frontend/dist. The backend serves those
      static files directly — no Vite dev server in production. Uses npm
      (the repo ships package-lock.json; npm is bundled with the nodejs
      conda package).
    commands:
      # npm is a node script (#!/usr/bin/env node) — node must be on PATH,
      # so prepend the env's bin even though we call npm by absolute path.
      - 'cd "$REPO_DIR/aba/frontend" && PATH="$ENV_DIR/bin:$PATH" "$ENV_DIR/bin/npm" ci'
      # Bundle with vite directly rather than `npm run build` (= `tsc -b &&
      # vite build`). The tsc typecheck gate is optional for producing a
      # runnable artifact — vite/esbuild strips types without checking — and
      # dev (`vite`) skips it too, so the built app matches the dev app.
      - 'cd "$REPO_DIR/aba/frontend" && PATH="$ENV_DIR/bin:$PATH" ./node_modules/.bin/vite build'
    timeout_seconds: 600
    remediation: |
      The frontend build failed — it needs Node 20+, which ships inside the conda
      env, so this usually means create-env didn't finish. Confirm
      "$ENV_DIR/bin/node --version" is >= 20 (re-run create-env if not), then retry.

  - id: install-launcher
    title: Install the aba launcher
    why: |
      Places the `aba` control script at $ABA_HOME/bin/aba — kept under the ABA
      home so the whole install stays self-contained (uninstall = one rm -rf,
      nothing in ~/bin or /usr/local/bin). The Control panel runs it by full
      path; for a terminal `aba` command, add $ABA_HOME/bin to PATH.
    commands:
      - 'mkdir -p "$ABA_HOME/bin"'
      - 'install -m 0755 "$ABA_HOME/installer/aba" "$ABA_HOME/bin/aba"'
    timeout_seconds: 10
    remediation: |
      Installing the aba launcher failed — check that $ABA_HOME/bin is writable
      and $HOME has free space, then re-run.

  - id: start-backend
    title: Start ABA
    why: First boot of the backend; serves the workspace at http://localhost:8000.
    commands:
      # RESTART, not just `up`: a (re)install just wrote fresh credentials to
      # config.env, but `up` no-ops when a backend is already running — so a
      # stale process from a prior session would keep serving its OLD (often
      # expired) OAuth token and every request 401s. stop+up forces the new
      # process to load the freshly-captured credential. `stop` is a no-op when
      # nothing is running.
      - '"$ABA_HOME/bin/aba" stop || true'
      - '"$ABA_HOME/bin/aba" up'
    timeout_seconds: 60
    remediation: |
      The backend didn't come up. Check the log under $ABA_HOME/logs/, confirm a
      credential is set in $ABA_HOME/config.env, and run `aba doctor` for a full
      diagnosis of the install.

  - id: complete-base-env
    title: Finish the analysis environment
    why: |
      STAGED prewarm only (ABA_ENV_PREWARM=staged). The server is already up on the
      minimal boot base (previous step); now complete the full scientific + bio
      stack (scanpy, anndata, scvi-tools→torch, leidenalg, …) into the base with
      `micromamba env update -f environment.yml`, so the completed base equals the
      eager build. Runs WHILE the server serves — the R tools env provisions in
      parallel in the backend (lifespan._provision_r_base_bg). The `.aba-base-stage`
      marker (completing→ready) lets the backend skip its base self-heal mid-write
      and lets a kernel import of a not-yet-installed package wait-with-progress
      instead of erroring. Eager installs already hold the full base → no-op.
      NON-FATAL: a failure leaves the server up on the boot base (on-demand installs
      cover gaps); the marker stays `completing` and `aba update` resumes it.
    commands:
      # chmod u+w first: micromamba links package dirs read-only, so env update
      # can't replace files without it (same guard as update.yml refresh-env).
      - 'if [ "${ABA_ENV_PREWARM:-eager}" != staged ]; then echo "eager: base already complete — skipping"; exit 0; fi; if [ "$(cat "$ENV_DIR/.aba-base-stage" 2>/dev/null)" = ready ]; then echo "base already complete (stage=ready) — skipping"; exit 0; fi; printf completing > "$ENV_DIR/.aba-base-stage"; chmod -R u+w "$ENV_DIR"/lib/python*/site-packages 2>/dev/null || true; if [ "${ABA_ACCELERATOR:-cpu}" = "cuda" ]; then export CONDA_OVERRIDE_CUDA="${ABA_CUDA_VERSION:-11.8}"; echo "[accelerator] CUDA base: CONDA_OVERRIDE_CUDA=$CONDA_OVERRIDE_CUDA"; fi; if PYTHONNOUSERSITE=1 PIP_USER=0 "$ABA_HOME/bin/micromamba" env update --channel-priority strict -p "$ENV_DIR" -f "$ABA_HOME/environment.yml"; then printf ready > "$ENV_DIR/.aba-base-stage"; echo "[env] base completion done (stage=ready)"; else echo "WARNING: base completion incomplete (stage stays completing); server is up on the boot base and the agent installs missing libraries on demand — re-run: aba update"; fi'
    timeout_seconds: 1800
    remediation: |
      Completing the base env failed — NON-FATAL: the server is up on the boot base
      and the agent provisions missing libraries on demand (ensure_capability). The
      stage marker stays `completing`; re-run `aba update` (or the installer) to
      resume — it is idempotent (already-installed packages are skipped). Check
      ~10 GB free and that conda-forge/bioconda are reachable.

  - id: complete-r-env
    title: Finish the R toolchain
    why: |
      STAGED prewarm only. Build the full R tools env (r-environment.yml: r-base +
      Seurat/Bioconductor) + the lstar R `.rds` viewer bridge AFTER the server is up
      — the SAME env eager installs build before start, deferred here so it doesn't
      block first boot (runs after the Python completion while the server serves).
      The backend's own R provisioning (lifespan._provision_r_base_bg) defers while
      the base is staging, so it can't race this. The R Jupyter kernel is installed
      on demand by the kernel layer regardless. NON-FATAL: on failure the backend
      provisions R on demand the first time it's needed.
    commands:
      - 'if [ "${ABA_ENV_PREWARM:-eager}" != staged ]; then echo "eager: R env built before start — skipping"; exit 0; fi; TOOLS_ENV="${ABA_RUNTIME_DIR:-$ABA_HOME/runtime}/envs/tools"; RYML="${ABA_R_ENV_YML_SRC:-$REPO_DIR/aba/install/core/r-environment.yml}"; if [ -x "$TOOLS_ENV/bin/Rscript" ] && [ -d "$TOOLS_ENV/lib/R/library/Seurat" ]; then echo "R tools env already present — skipping"; else rm -rf "$TOOLS_ENV"; mkdir -p "$(dirname "$TOOLS_ENV")" && { "$ABA_HOME/bin/micromamba" create -y -v --channel-priority strict -p "$TOOLS_ENV" -f "$RYML" || echo "WARNING: R tools env build failed; the backend will provision R on demand"; }; fi; H="$REPO_DIR/aba/install/core/install-lstar-r.sh"; if [ -f "$H" ]; then bash "$H" "$TOOLS_ENV" "$ABA_HOME/bin/micromamba" || echo "WARNING: lstar R viewer bridge install failed (.rds viewing degraded; .h5ad/.lstar.zarr unaffected)"; else echo "no install-lstar-r.sh — skipping lstar R"; fi'
    timeout_seconds: 1800
    remediation: |
      Building the R toolchain failed — NON-FATAL: Python works and the backend
      provisions R on demand the first time it's needed. Ensure conda-forge/bioconda
      are reachable and ~5 GB is free, then re-run `aba update`.
