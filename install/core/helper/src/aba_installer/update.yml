# ABA update playbook — pulls fresh code + recipes, refreshes the conda env.
# Run via /api/update or the UI's "⤓ Check for updates" button.
# Idempotent: re-running with no upstream changes is a no-op.

defaults:
  timeout_seconds: 300

env_vars:
  ABA_HOME: "$HOME/.aba"
  ENV_DIR: "$ABA_HOME/env"
  REPO_DIR: "$ABA_HOME/repo"
  # Source overrides (ABA_ENV_YML_URL/SRC, ABA_REPO_SRC, ABA_RECIPES_SRC) come
  # from the environment; URL defaults are inlined as ${VAR:-default} below so
  # an exported override isn't clobbered by env_vars. See install.yml.

steps:
  - id: pull-aba
    title: Update aba
    why: Pull the latest backend + frontend code.
    commands:
      # ABA_REF (default main) pins to a branch / tag / commit. Try a shallow fetch of
      # the ref (branch/tag/allowed SHA) → reset to FETCH_HEAD; else full fetch + reset
      # (covers bare commit SHAs). The CLI bootstrap-pulls this same ref before loading
      # the playbook, so a pin stays consistent across both.
      - 'if [ -n "${ABA_REPO_SRC:-}" ]; then rsync -a --exclude .envs_cache --exclude _runs --exclude reports --exclude .git --exclude .venv --exclude node_modules --exclude dist --exclude __pycache__ "$ABA_REPO_SRC/" "$REPO_DIR/aba/"; else R="${ABA_REF:-main}"; cd "$REPO_DIR/aba" && { git fetch --depth 1 origin "$R" 2>/dev/null && git reset --hard FETCH_HEAD || { git fetch origin && git reset --hard "$R"; }; }; fi'
    timeout_seconds: 60

  - id: reinstall-helper
    title: Refresh the installer helper
    why: |
      Reinstall the installer helper (cli.py / control.py / playbook.py / launcher.py)
      from the just-pulled repo into $ABA_HOME/installer/venv, so fixes to the INSTALLER
      ITSELF propagate on `aba update` — not just update.yml (which already self-updates
      via _playbook_path preferring the pulled copy). Without this the helper stays frozen
      at install time — the trap that kept the git-C→cwd bootstrap fix off old-git clusters
      until a manual reinstall. Takes effect on the NEXT run (this run's cli.py is already
      imported). Non-fatal: on failure the existing (working) helper stays in place.
    commands:
      # BEST-EFFORT + NON-FATAL: this step must NEVER stop the update (a slow pip on a
      # networked FS was blocking the real work). Time-bound pip (when `timeout` exists)
      # and always `exit 0` — on failure the existing helper stays and it retries next
      # update; installer fixes are infrequent, so an occasional skip is fine.
      - 'VENV="$ABA_HOME/installer/venv"; H="$REPO_DIR/aba/install/core/helper"; msg="no installer venv/helper source — skipping helper refresh"; if [ -x "$VENV/bin/pip" ] && [ -d "$H" ]; then if command -v timeout >/dev/null 2>&1; then RUN="timeout 240"; else RUN=""; fi; if $RUN "$VENV/bin/pip" install -q --force-reinstall --no-deps "$H" >/dev/null 2>&1; then msg="installer helper refreshed from $H"; else msg="NOTE: helper refresh skipped (slow/failed) — existing helper kept; retries next update"; fi; fi; echo "$msg"; true'
    timeout_seconds: 300

  - id: pull-recipes
    title: Update aba-recipe-pack
    why: Pull the latest skill/recipe library so newly-published recipes appear.
    commands:
      - 'if [ -n "${ABA_RECIPES_SRC:-}" ]; then mkdir -p "$REPO_DIR/aba-recipe-pack" && rsync -a --exclude .envs_cache --exclude _runs --exclude reports --exclude .git --exclude __pycache__ "$ABA_RECIPES_SRC/" "$REPO_DIR/aba-recipe-pack/"; elif [ -d "$REPO_DIR/aba-recipe-pack/.git" ]; then R="${RECIPES_REF:-main}"; cd "$REPO_DIR/aba-recipe-pack" && { git fetch --depth 1 origin "$R" 2>/dev/null && git reset --hard FETCH_HEAD || { git fetch origin && git reset --hard "$R"; }; }; else R="${RECIPES_REF:-main}"; U="${ABA_RECIPES_URL:-https://github.com/kharchenkolab/aba-recipe-pack}"; git clone --depth 1 --branch "$R" "$U" "$REPO_DIR/aba-recipe-pack" 2>/dev/null || { git clone "$U" "$REPO_DIR/aba-recipe-pack" && git --git-dir="$REPO_DIR/aba-recipe-pack/.git" --work-tree="$REPO_DIR/aba-recipe-pack" checkout "$R"; }; fi'
    timeout_seconds: 60

  - id: import-recipes
    title: Re-import the recipe pack
    why: |
      Re-map the freshly-pulled pack into the installation-scope bundle the
      backend reads ($ABA_HOME/installation): recipes/<domain>/ →
      skills/recipes/<domain>/, catalog/*.yaml → catalog/, and knowhow/ →
      knowhow/ (the advisory docs recipes cross-link to AND knowhow/refsources/).
      MUST mirror install.yml's import — this DRIFTED once (update copied only
      recipes+catalog, so newly-published knowhows — e.g. the pagoda3 viewer
      knowhow — never reached updated instances). Idempotent + always re-copied
      (kilobytes), so an update refreshes it.
    commands:
      - 'PACK="$REPO_DIR/aba-recipe-pack"; INST="$ABA_HOME/installation"; mkdir -p "$INST/skills/recipes" "$INST/catalog" "$INST/knowhow"; if [ -d "$PACK/recipes" ]; then cp -R "$PACK/recipes/." "$INST/skills/recipes/"; fi; if ls "$PACK"/catalog/*.yaml >/dev/null 2>&1; then cp "$PACK"/catalog/*.yaml "$INST/catalog/"; fi; if [ -d "$PACK/knowhow" ]; then cp -R "$PACK/knowhow/." "$INST/knowhow/"; fi'
      - 'echo "imported $(find "$ABA_HOME/installation/skills/recipes" -name "*.md" 2>/dev/null | wc -l | tr -d " ") recipe files + $(ls "$ABA_HOME/installation/catalog"/*.yaml 2>/dev/null | wc -l | tr -d " ") catalog files + $(ls "$ABA_HOME/installation/knowhow/refsources"/*.yaml 2>/dev/null | wc -l | tr -d " ") refsource providers into $ABA_HOME/installation"'
    timeout_seconds: 60

  - id: refresh-weft
    title: Refresh the compute substrate (weft)
    why: |
      Re-resolve WEFT_REF (default main; pin in config.env) and reinstall the
      weft package so substrate fixes propagate on `aba update` — same lifecycle
      as the aba checkout. The pixi binaries are version-pinned and only change
      when ABA_PIXI_VERSION does (the install step is idempotent — re-run
      install for a binary bump). NON-FATAL: a failed refresh keeps the working
      substrate in place and retries next update.
    commands:
      - 'msg="weft refresh skipped (no checkout — run install to provision)"; if [ -n "${ABA_WEFT_SRC:-}" ]; then mkdir -p "$REPO_DIR/weft" && rsync -a --exclude .git --exclude __pycache__ --exclude .pixi "$ABA_WEFT_SRC/" "$REPO_DIR/weft/" && msg="weft refreshed from $ABA_WEFT_SRC"; elif [ -d "$REPO_DIR/weft/.git" ]; then R="${WEFT_REF:-main}"; cd "$REPO_DIR/weft" && { git fetch --depth 1 origin "$R" 2>/dev/null && git reset --hard FETCH_HEAD || { git fetch origin && git reset --hard "$R"; }; } && msg="weft at $(git rev-parse --short HEAD) (ref $R)"; fi; echo "$msg"; true'
      - 'if [ -d "$REPO_DIR/weft" ]; then "$ENV_DIR/bin/python" -m pip install --quiet --no-user "$REPO_DIR/weft" || echo "NOTE: weft reinstall failed — existing install kept; retries next update"; fi; true'
    timeout_seconds: 300

  - id: refresh-env
    title: Refresh the environment
    why: |
      Apply any new pinned dependencies from environment.yml. Usually a
      no-op; only takes time when the upstream env actually changed.
    commands:
      # Three-branch source resolution, mirroring install.yml: prefer an
      # explicit override, then the env.yml from the JUST-PULLED local
      # clone (pull-aba above guaranteed it's fresh), then curl as the
      # last resort. Pre-2026-06-11 this only had the override + curl
      # branches — every update tried to fetch from raw.github while the
      # repos were private, failing with curl exit 56. The local-clone
      # branch makes the env-refresh idempotent and offline-friendly.
      - 'if [ -n "${ABA_ENV_YML_SRC:-}" ]; then cp "$ABA_ENV_YML_SRC" "$ABA_HOME/environment.yml"; elif [ -f "$REPO_DIR/aba/install/core/environment.yml" ]; then cp "$REPO_DIR/aba/install/core/environment.yml" "$ABA_HOME/environment.yml"; else curl -fsSLo "$ABA_HOME/environment.yml" "${ABA_ENV_YML_URL:-https://raw.githubusercontent.com/kharchenkolab/aba/main/install/core/environment.yml}"; fi'
      # Deployment-conditional base — MUST mirror create-env (finding F1): inject the CUDA
      # torch pin when ABA_ACCELERATOR=cuda, else `env update --prune` resolves the plain
      # (CPU) spec and prunes the GPU torch build back to CPU. Keep this in lock-step with
      # install.yml's create-env accelerator handling.
      - 'if [ -f "$REPO_DIR/aba/install/core/inject-accelerator.sh" ]; then bash "$REPO_DIR/aba/install/core/inject-accelerator.sh" "$ABA_HOME/environment.yml"; fi'
      # PYTHONNOUSERSITE=1 + PIP_USER=0: build blind to ~/.local so a user-site pip
      # package can't shadow the env's pip: section (see install.yml create-env).
      # chmod u+w site-packages FIRST: micromamba links package dirs READ-ONLY, so a
      # pip pin BUMP (e.g. lstar-sc 0.2.0→0.2.1) fails on `aba update` with "Lacking
      # write permission" — pip can't remove the old package dir (regression 2026-07-11).
      # env update targets the FULL environment.yml, so on a STAGED install it also
      # COMPLETES an interrupted boot base (adds T1/T2) and stamps the stage marker
      # `ready` — `aba update` is the resume path for a staged completion that died.
      - 'chmod -R u+w "$ENV_DIR"/lib/python*/site-packages 2>/dev/null || true; if [ "${ABA_ACCELERATOR:-cpu}" = "cuda" ]; then export CONDA_OVERRIDE_CUDA="${ABA_CUDA_VERSION:-11.8}"; echo "[accelerator] CUDA base: CONDA_OVERRIDE_CUDA=$CONDA_OVERRIDE_CUDA"; fi; PYTHONNOUSERSITE=1 PIP_USER=0 "$ABA_HOME/bin/micromamba" env update -p "$ENV_DIR" -f "$ABA_HOME/environment.yml" --prune && printf ready > "$ENV_DIR/.aba-base-stage"'
    timeout_seconds: 900

  # Module refresh — NOT hardcoded lstar/pagoda3 steps. install.yml is core-only
  # (R + the pagoda3 viewer are first_use MODULES the backend reconciler owns —
  # misc/modules.md); the eager install-lstar-r / fetch-pagoda3-dist steps that used
  # to live here drifted from that (they installed module artifacts for everyone, even
  # with the module OFF). Instead we re-provision only the modules you ACTUALLY have,
  # so a pinned-artifact bump (lstar git ref, pagoda3 dist zip) still lands on update.
  - id: refresh-modules
    title: Refresh installed modules
    why: |
      Re-provision the modules you already have — every ON module plus any first_use
      module that's already installed (r-bio's lstar R bridge, viewer-pagoda3's dist).
      Their installs are idempotent + version-aware, so this picks up a pinned-artifact
      bump the module's presence-based readiness probe can't see. OFF modules and
      never-installed first_use modules are SKIPPED — an update refreshes what you have,
      it never adds a module you didn't ask for. Runs the same reconciler the backend
      uses, so installer and runtime can't drift again.
    commands:
      # Non-fatal: module provisioning must never block a core update (a module can be
      # (re)installed later from Settings → Modules or on first use). Uses the env python
      # + the just-pulled backend; RUNTIME dir mirrors the other steps' default.
      - 'RT="${ABA_RUNTIME_DIR:-$ABA_HOME/runtime}"; if ABA_HOME="$ABA_HOME" ABA_RUNTIME_DIR="$RT" PYTHONPATH="$REPO_DIR/aba/backend" "$ENV_DIR/bin/python" -c "from core.modules import reconciler; print(\"[modules] refresh:\", reconciler.refresh_installed())"; then :; else echo "module refresh skipped (non-fatal) — reinstall from Settings → Modules if a viewer is stale"; fi; true'
    timeout_seconds: 900
    remediation: |
      Module refresh failed — NON-FATAL, and core ABA is unaffected. A specific module
      (e.g. r-bio's lstar `.rds` bridge, or the pagoda3 viewer dist) may be stale or
      missing; reclaim + re-enable it from Settings → Modules, or it re-provisions on
      next first use. `.h5ad` / `.lstar.zarr` viewing does not depend on the R bridge.

  - id: rebuild-frontend
    title: Rebuild the interface
    why: Picks up any frontend changes that landed since last build.
    commands:
      - 'cd "$REPO_DIR/aba/frontend" && PATH="$ENV_DIR/bin:$PATH" "$ENV_DIR/bin/npm" ci'
      - 'cd "$REPO_DIR/aba/frontend" && PATH="$ENV_DIR/bin:$PATH" ./node_modules/.bin/vite build'
    timeout_seconds: 600

  - id: bounce-backend
    title: Restart ABA
    why: Pick up the new code in the running backend. Skipped if backend isn't already running.
    commands:
      - '"$ABA_HOME/bin/aba" stop 2>/dev/null || true'
      - '"$ABA_HOME/bin/aba" up'
    timeout_seconds: 30
