<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ABA</title>
  <link rel="stylesheet" href="/ui/app.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Per page section, hidden/shown by app.js based on current state -->
  <template id="page-welcome">
    <section class="page">
      <h1>Welcome to ABA</h1>
      <p class="lead">An AI-orchestrated workspace for biology.</p>
      <p>Connect your Anthropic account to begin:</p>

      <div class="authtabs">
        <button class="authtab active" id="tab-apikey" type="button">API key</button>
        <button class="authtab" id="tab-oauth" type="button">Claude.ai subscription</button>
      </div>

      <div class="authpanel" id="panel-apikey">
        <label class="label">Anthropic API key
          <input type="password" id="apikey-input" placeholder="sk-ant-…" autocomplete="off" />
        </label>
        <p class="muted">A paid Anthropic API key — billed to your organization.</p>
      </div>

      <div class="authpanel" id="panel-oauth" hidden>
        <p class="muted">Use your Claude Pro / Max subscription — no API key needed.</p>
        <button class="btn primary" id="oauth-signin">Sign in with Claude.ai</button>
        <p class="muted" id="oauth-status" hidden></p>
        <details class="oauth-fallback">
          <summary>Having trouble? Paste a token instead</summary>
          <p class="muted">Run <code>claude setup-token</code> in a Terminal and paste what it prints:</p>
          <label class="label">Claude Code OAuth token
            <input type="password" id="oauth-input" placeholder="sk-ant-oat…" autocomplete="off" />
          </label>
          <button class="btn" id="oauth-paste-submit">Use this token</button>
        </details>
      </div>

      <p class="error" id="auth-error"></p>
      <button class="btn primary" id="auth-submit">Continue</button>
      <p class="muted">
        We'll store this on your Mac at
        <code>~/.aba/config.env</code> (mode 0600).
      </p>
      <!-- The install runs in the background while you sign in; this shows it. -->
      <p class="muted setup-strip" id="setup-strip" hidden></p>
    </section>
  </template>

  <template id="page-setup">
    <section class="page">
      <h1>Setting up ABA…</h1>
      <p class="lead">Installing into <code id="aba-home"></code>. This runs by
        itself — nothing to click. ABA opens automatically when it's ready.</p>
      <progress id="setup-bar" value="0" max="100"></progress>
      <p id="setup-current">Starting…</p>
      <ol class="steps" id="setup-steps"></ol>
      <p class="error" id="setup-error"></p>
      <details>
        <summary>Show details</summary>
        <pre id="setup-log"></pre>
      </details>
    </section>
  </template>

  <template id="page-control">
    <section class="page">
      <h1>ABA Control</h1>
      <p class="status" id="run-status">●  …</p>
      <p class="muted" id="run-meta"></p>
      <p>
        <a class="btn primary" id="open-aba" href="http://127.0.0.1:8000" target="_blank">
          Open ABA →
        </a>
      </p>
      <div class="row">
        <button class="btn" id="ctl-start">▶ Start</button>
        <button class="btn" id="ctl-stop">⏻ Stop</button>
        <button class="btn" id="ctl-restart">↻ Restart</button>
        <button class="btn" id="ctl-update">⤓ Check updates</button>
      </div>
      <div class="row muted">
        <button class="btn link" id="ctl-help">🛟 Help</button>
        <button class="btn link" id="ctl-uninstall">Uninstall</button>
      </div>
      <details id="diag">
        <summary>Show details</summary>
        <p class="muted" id="diag-meta"></p>
        <pre id="logs-view"></pre>
      </details>
      <!-- Update progress shares the same step renderer as install -->
      <div id="update-progress" hidden>
        <h3>Updating…</h3>
        <progress id="update-bar" value="0" max="100"></progress>
        <p id="update-current"></p>
        <ol class="steps" id="update-steps"></ol>
      </div>
    </section>
  </template>

  <script src="/ui/app.js" defer></script>
</body>
</html>
