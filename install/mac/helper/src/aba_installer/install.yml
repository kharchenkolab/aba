# ABA install playbook — the deterministic sequence of steps to install
# ABA on a fresh Mac. The control API executes these in order; the agent
# (H8) reads the same file when surfaced for failure diagnosis.
#
# Variables substituted at run time: ABA_HOME, ENV_DIR, REPO_DIR.
# (Arch is computed inline as $(uname -m) where needed — env_vars are
# expanded with plain variable substitution, not shell command sub.)

defaults:
  timeout_seconds: 300

env_vars:
  ABA_HOME: "$HOME/.aba"
  ENV_DIR: "$ABA_HOME/env"
  REPO_DIR: "$ABA_HOME/repo"
  # Sources can be overridden from the environment (the defaults are inlined
  # into the commands as ${VAR:-default}, NOT set here — env_vars would
  # clobber an exported override):
  #   ABA_ENV_YML_URL / ABA_REPO_URL / ABA_RECIPES_URL — fetch/clone from a
  #     different URL (e.g. git@github.com:… for SSH while the repos are private).
  #   ABA_ENV_YML_SRC / ABA_REPO_SRC / ABA_RECIPES_SRC — install from a local
  #     path (working tree / offline mirror) instead of fetching. Used by the
  #     smoke harness to test un-pushed changes.

steps:
  - id: preflight
    title: Pre-flight system check
    why: Confirm macOS version + arch + free disk before doing anything.
    commands:
      - "uname -m"
      - "sw_vers -productVersion"
      - "df -h $HOME | tail -1"
      - "xcode-select -p 2>/dev/null || true"
    timeout_seconds: 30

  - id: install-micromamba
    title: Install micromamba
    why: Manages the isolated Python + R environment. ~20 MB binary, no admin needed.
    commands:
      - 'mkdir -p "$ABA_HOME/bin"'
      - 'if [ -x "$ABA_HOME/bin/micromamba" ]; then echo "micromamba already installed"; else curl -fsSL "https://micro.mamba.pm/api/micromamba/osx-$(uname -m)/latest" | tar -xj -C "$ABA_HOME" bin/micromamba; fi'
      - '"$ABA_HOME/bin/micromamba" --version'
    timeout_seconds: 120

  - id: create-env
    title: Create the conda environment
    why: |
      Installs Python 3.12, R 4.4, Node 20, and the bio dependencies
      (anndata, scanpy, scvi-tools, deseq2, edger, seurat, ...). Largest
      step — ~9 minutes on a typical connection.
    commands:
      # Prefer an explicit override, then the env.yml from the cloned repo
      # (the common case — setup.command already cloned it), then a URL fetch.
      - 'if [ -n "${ABA_ENV_YML_SRC:-}" ]; then cp "$ABA_ENV_YML_SRC" "$ABA_HOME/environment.yml"; elif [ -f "$REPO_DIR/aba/install/mac/environment.yml" ]; then cp "$REPO_DIR/aba/install/mac/environment.yml" "$ABA_HOME/environment.yml"; else curl -fsSLo "$ABA_HOME/environment.yml" "${ABA_ENV_YML_URL:-https://raw.githubusercontent.com/kharchenkolab/aba/main/install/mac/environment.yml}"; fi'
      # Idempotent + self-healing. Marker is env/bin/uvicorn (pip-installed at
      # the very end) so a half-built env from an interrupted prewarm is NOT
      # mistaken for complete — we wipe and rebuild it (the package cache makes
      # that fast). conda-meta would appear before the pip layer and skip a
      # broken env, leaving "uvicorn: No such file or directory" at start.
      - 'if [ -x "$ENV_DIR/bin/uvicorn" ]; then echo "environment already present — skipping create"; else rm -rf "$ENV_DIR"; "$ABA_HOME/bin/micromamba" create -y -v -p "$ENV_DIR" -f "$ABA_HOME/environment.yml"; fi'
    timeout_seconds: 1200

  - id: clone-repos
    title: Clone aba + aba-recipes
    why: Source for the backend, the frontend, and the recipe library.
    commands:
      - 'mkdir -p "$REPO_DIR"'
      - 'if [ -d "$REPO_DIR/aba" ]; then :; elif [ -n "${ABA_REPO_SRC:-}" ]; then mkdir -p "$REPO_DIR/aba" && rsync -a --exclude .git --exclude node_modules --exclude dist --exclude __pycache__ "$ABA_REPO_SRC/" "$REPO_DIR/aba/"; else git clone --depth 1 "${ABA_REPO_URL:-https://github.com/kharchenkolab/aba}" "$REPO_DIR/aba"; fi'
      - 'if [ -d "$REPO_DIR/aba-recipes" ]; then :; elif [ -n "${ABA_RECIPES_SRC:-}" ]; then mkdir -p "$REPO_DIR/aba-recipes" && rsync -a --exclude .git --exclude __pycache__ "$ABA_RECIPES_SRC/" "$REPO_DIR/aba-recipes/"; else git clone --depth 1 "${ABA_RECIPES_URL:-https://github.com/kharchenkolab/aba-recipes}" "$REPO_DIR/aba-recipes"; fi'
    timeout_seconds: 120

  - id: create-r-tools-env
    title: Build the R toolchain
    why: |
      Pre-builds R + IRkernel + Seurat/Bioconductor into the backend's tools
      env ($ABA_RUNTIME_DIR/envs/tools) so the agent's R work uses it directly,
      instead of the slow Bioconductor-scale solve the backend would otherwise
      run on first R use. Kept separate from the Python env so the two stay
      decoupled (see r-environment.yml). Non-fatal: if it fails, Python still
      works and the backend falls back to provisioning R on demand. Marker is
      Seurat (a late, heavy package) so a half-built env rebuilds rather than
      being mistaken for complete.
    commands:
      - 'TOOLS_ENV="${ABA_RUNTIME_DIR:-$ABA_HOME/runtime}/envs/tools"; RYML="${ABA_R_ENV_YML_SRC:-$REPO_DIR/aba/install/mac/r-environment.yml}"; if [ -x "$TOOLS_ENV/bin/Rscript" ] && [ -d "$TOOLS_ENV/lib/R/library/Seurat" ]; then echo "R tools env already present — skipping"; else rm -rf "$TOOLS_ENV"; mkdir -p "$(dirname "$TOOLS_ENV")" && { "$ABA_HOME/bin/micromamba" create -y -v -p "$TOOLS_ENV" -f "$RYML" || echo "WARNING: R tools env build failed; the backend will provision R on demand"; }; fi'
    timeout_seconds: 1800

  - id: build-frontend
    title: Build the interface
    why: |
      One-shot frontend build into frontend/dist. The backend serves those
      static files directly — no Vite dev server in production. Uses npm
      (the repo ships package-lock.json; npm is bundled with the nodejs
      conda package).
    commands:
      # npm is a node script (#!/usr/bin/env node) — node must be on PATH,
      # so prepend the env's bin even though we call npm by absolute path.
      - 'cd "$REPO_DIR/aba/frontend" && PATH="$ENV_DIR/bin:$PATH" "$ENV_DIR/bin/npm" ci'
      # Bundle with vite directly rather than `npm run build` (= `tsc -b &&
      # vite build`). The tsc typecheck gate is optional for producing a
      # runnable artifact — vite/esbuild strips types without checking — and
      # dev (`vite`) skips it too, so the built app matches the dev app.
      - 'cd "$REPO_DIR/aba/frontend" && PATH="$ENV_DIR/bin:$PATH" ./node_modules/.bin/vite build'
    timeout_seconds: 600

  - id: install-launcher
    title: Install the aba launcher
    why: |
      Places the `aba` control script at $ABA_HOME/bin/aba — kept under the ABA
      home so the whole install stays self-contained (uninstall = one rm -rf,
      nothing in ~/bin or /usr/local/bin). The Control panel runs it by full
      path; for a terminal `aba` command, add $ABA_HOME/bin to PATH.
    commands:
      - 'mkdir -p "$ABA_HOME/bin"'
      - 'install -m 0755 "$ABA_HOME/installer/aba" "$ABA_HOME/bin/aba"'
    timeout_seconds: 10

  - id: start-backend
    title: Start ABA
    why: First boot of the backend; serves the workspace at http://localhost:8000.
    commands:
      # RESTART, not just `up`: a (re)install just wrote fresh credentials to
      # config.env, but `up` no-ops when a backend is already running — so a
      # stale process from a prior session would keep serving its OLD (often
      # expired) OAuth token and every request 401s. stop+up forces the new
      # process to load the freshly-captured credential. `stop` is a no-op when
      # nothing is running.
      - '"$ABA_HOME/bin/aba" stop || true'
      - '"$ABA_HOME/bin/aba" up'
    timeout_seconds: 60
