# ABA install playbook — the deterministic sequence of steps to install
# ABA on a fresh Mac. The control API executes these in order; the agent
# (H8) reads the same file when surfaced for failure diagnosis.
#
# Variables substituted at run time: ABA_HOME, ENV_DIR, REPO_DIR.
# (Arch is computed inline as $(uname -m) where needed — env_vars are
# expanded with plain variable substitution, not shell command sub.)

defaults:
  timeout_seconds: 300

env_vars:
  ABA_HOME: "$HOME/.aba"
  ENV_DIR: "$ABA_HOME/env"
  REPO_DIR: "$ABA_HOME/repo"
  # Where the install pulls the conda env spec + repos from. The defaults
  # point at the public GitHub raw/clone URLs. Override the *_SRC vars with
  # a local path to install from a working tree or an offline mirror — this
  # is also how the isolated smoke harness tests un-pushed changes.
  ABA_ENV_YML_URL: "https://raw.githubusercontent.com/kharchenkolab/aba/main/install/mac/environment.yml"
  ABA_REPO_URL: "https://github.com/kharchenkolab/aba"
  ABA_RECIPES_URL: "https://github.com/kharchenkolab/aba-recipes"
  # ABA_ENV_YML_SRC / ABA_REPO_SRC / ABA_RECIPES_SRC — unset by default;
  # when set to a local path, used instead of the URL above.

steps:
  - id: preflight
    title: Pre-flight system check
    why: Confirm macOS version + arch + free disk before doing anything.
    commands:
      - "uname -m"
      - "sw_vers -productVersion"
      - "df -h $HOME | tail -1"
      - "xcode-select -p 2>/dev/null || true"
    timeout_seconds: 30

  - id: install-micromamba
    title: Install micromamba
    why: Manages the isolated Python + R environment. ~20 MB binary, no admin needed.
    commands:
      - 'mkdir -p "$ABA_HOME/bin"'
      - 'curl -fsSL "https://micro.mamba.pm/api/micromamba/osx-$(uname -m)/latest" | tar -xj -C "$ABA_HOME" bin/micromamba'
      - '"$ABA_HOME/bin/micromamba" --version'
    timeout_seconds: 120

  - id: create-env
    title: Create the conda environment
    why: |
      Installs Python 3.12, R 4.4, Node 20, and the bio dependencies
      (anndata, scanpy, scvi-tools, deseq2, edger, seurat, ...). Largest
      step — ~9 minutes on a typical connection.
    commands:
      - 'if [ -n "${ABA_ENV_YML_SRC:-}" ]; then cp "$ABA_ENV_YML_SRC" "$ABA_HOME/environment.yml"; else curl -fsSLo "$ABA_HOME/environment.yml" "$ABA_ENV_YML_URL"; fi'
      - '"$ABA_HOME/bin/micromamba" create -y -p "$ENV_DIR" -f "$ABA_HOME/environment.yml"'
    timeout_seconds: 1200

  - id: clone-repos
    title: Clone aba + aba-recipes
    why: Source for the backend, the frontend, and the recipe library.
    commands:
      - 'mkdir -p "$REPO_DIR"'
      - 'if [ -d "$REPO_DIR/aba" ]; then :; elif [ -n "${ABA_REPO_SRC:-}" ]; then mkdir -p "$REPO_DIR/aba" && rsync -a --exclude .git --exclude node_modules --exclude dist --exclude __pycache__ "$ABA_REPO_SRC/" "$REPO_DIR/aba/"; else git clone --depth 1 "$ABA_REPO_URL" "$REPO_DIR/aba"; fi'
      - 'if [ -d "$REPO_DIR/aba-recipes" ]; then :; elif [ -n "${ABA_RECIPES_SRC:-}" ]; then mkdir -p "$REPO_DIR/aba-recipes" && rsync -a --exclude .git --exclude __pycache__ "$ABA_RECIPES_SRC/" "$REPO_DIR/aba-recipes/"; else git clone --depth 1 "$ABA_RECIPES_URL" "$REPO_DIR/aba-recipes"; fi'
    timeout_seconds: 120

  - id: build-frontend
    title: Build the interface
    why: |
      One-shot frontend build into frontend/dist. The backend serves those
      static files directly — no Vite dev server in production. Uses npm
      (the repo ships package-lock.json; npm is bundled with the nodejs
      conda package).
    commands:
      # npm is a node script (#!/usr/bin/env node) — node must be on PATH,
      # so prepend the env's bin even though we call npm by absolute path.
      - 'cd "$REPO_DIR/aba/frontend" && PATH="$ENV_DIR/bin:$PATH" "$ENV_DIR/bin/npm" ci'
      # Bundle with vite directly rather than `npm run build` (= `tsc -b &&
      # vite build`). The tsc typecheck gate is optional for producing a
      # runnable artifact — vite/esbuild strips types without checking — and
      # dev (`vite`) skips it too, so the built app matches the dev app.
      - 'cd "$REPO_DIR/aba/frontend" && PATH="$ENV_DIR/bin:$PATH" ./node_modules/.bin/vite build'
    timeout_seconds: 600

  - id: install-launcher
    title: Install the aba launcher
    why: |
      Creates ~/bin/aba (no admin) by default. Use --global to install to
      /usr/local/bin/aba instead (will prompt for sudo).
    commands:
      - 'mkdir -p "$HOME/bin"'
      - 'install -m 0755 "$ABA_HOME/installer/aba" "$HOME/bin/aba"'
    timeout_seconds: 10

  - id: start-backend
    title: Start ABA
    why: First boot of the backend; serves the workspace at http://localhost:8000.
    commands:
      - '"$HOME/bin/aba" up'
    timeout_seconds: 30
