# Analysis run — a single coherent execution (code + parameters →
# outputs). Groups the figures/tables/files it produced. The recompute /
# branch unit: re-running regenerates outputs.
#
# Lifecycle has TWO axes: the platform `status` column (active/
# archived/failed/etc.) AND a bio-internal `metadata.run_state`
# ('open' | 'closed') that controls whether new outputs auto-attach.
# Only one open Run per thread at a time. Closing an empty Run discards it
# (handled in content/bio/lifecycle/runs.py:close_run).
name: analysis
display: Run
icon: runs
category: run

schema:
  required: [title]
  # Post Cutover 4: producing_code dropped. The Run's "captured code" is
  # now aggregated_code_for_run(run_id) over its exec records.
  optional: [artifact_path, producing_params,
             parent_entity_id, scenario_of, metadata, tags, notes,
             exec_id, artifact_kind, artifact_idx]
  # metadata commonly carries: thread_id (which thread owns this Run),
  # run_state ('open' | 'closed'), plan_entity_id (the Plan that opened
  # it), run (the output manifest — figures/tables/files harvested).

status_model:
  initial: active
  states: [active, running, completed, failed, cancelled, archived]
  transitions:
    active:    [running, completed, failed, archived]
    running:   [completed, failed, cancelled, archived]
    completed: [archived]
    failed:    [archived]
    cancelled: [archived]

allowed_edges:
  out: [used]   # the Run used a dataset / a focus entity
  # In: figures/tables wasGeneratedBy this Run; evidence/datasets
  # produced_by this Run; Results derive from this Run (wasDerivedFrom).
  in:  [wasGeneratedBy, produced_by, wasDerivedFrom]

focus:
  card_builder: content.bio.cards.analysis.build_analysis_card
  # The Run's code is the aggregate across its exec records, computed on
  # demand — there's no producing_code column for the agent to read.
  agent_sees: [title, producing_params, parent_summary,
               run_state, run_outputs_summary, tags, notes]

ui:
  panel: analysis
  list_fields: [title, status, output_count]
  thumbnail: null

creation:
  rail_plus: false
  # open_run is bio-internal — fires on approved-plan execution + on
  # explicit agent open_run calls.
  agent_tools: [open_run]
  user_gestures_chat: []     # users don't create Runs directly
  user_gestures_focus: []

advisors:
  on_create: []
  on_pin: []
  # The Methodologist reviews on transition into completed — see
  # content/bio/advisors/handlers.py.
  on_status_change:
    completed: [methodologist]

capabilities:
  is_run: true
  by_title_storage: run_dir
