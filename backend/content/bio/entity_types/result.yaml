# Result — the curated wrapper around evidence (figures, tables, notes,
# narrative). Created when a user "pins" or "promotes" evidence; the
# unified Pin/Result model from misc/entity_pin_redesign.md.
# Internal origin = produced by an in-project Run. External origin =
# imported (a gel, a wet-lab figure, an upload from another tool).
name: result
display: Result
icon: results
category: result

schema:
  required: [title]
  # Post Cutover 4: producing_code dropped. Results don't have their own
  # producing code — they wrap evidence (figures/tables) whose code is
  # reachable via each evidence's exec_id.
  optional: [artifact_path, producing_params,
             parent_entity_id, scenario_of, metadata, tags, notes]
  # metadata commonly carries: members (ordered list of {ref, kind}
  # pointing at figures/tables/notes/narrative entities), origin
  # ('internal' | 'external'), interpretation, thread_id, source_run,
  # question_source, question.

status_model:
  initial: active
  states: [active, archived]
  transitions:
    active: [archived]

allowed_edges:
  # A Result groups members (includes → figure/table/note/narrative),
  # records derivation provenance (wasDerivedFrom → evidence/run/figure),
  # and supports its evidence (with direction metadata).
  out: [supports, includes, wasDerivedFrom]
  # In: Claims/Findings support a Result (supports). Findings derive
  # from Results (finding --wasDerivedFrom--> result).
  in:  [supports, wasDerivedFrom]

focus:
  agent_sees: [title, interpretation, members_summary, origin,
               parent_summary, tags, notes]
  # Fields the generic update_entity_fields tool may write. Mirrors what
  # the HTTP PATCH /api/entities/{id} surface allows for a Result
  # (interpretation flips interpretation_origin → 'ai' downstream).
  # Member-list ops stay on the typed surface (add_result_member /
  # remove_result_member / make_revision) since they touch edges.
  agent_can_update: [title, notes, tags, interpretation]

ui:
  panel: result
  list_fields: [title, members_count]
  thumbnail: null            # rendered from the first figure member

creation:
  rail_plus: false
  # add_result_member / remove_result_member are also surfaced as agent
  # tools as of 2026-06-12 — without them the agent had no way to grow
  # an existing Result and had to fall back to the user-only focus
  # gesture (prj_8143327c thr_80190faf).
  agent_tools: [promote_to_result, promote_figure_to_result,
                add_result_member, remove_result_member]
  user_gestures_chat: [pin, promote_to_result, group_figures]
  user_gestures_focus: [add_member, remove_member, edit_interpretation]

advisors:
  on_create: []
  on_pin: [skeptic]
  on_status_change: {}

capabilities:
  sidebar: count
