# Thread — a line of inquiry. The primary unit of organization +
# navigation. Carries a title (short, navigation-shaped) + a question
# (one sentence stating what the thread is for) + an `open_questions`
# list of outstanding sub-questions. Lifecycle (open/parked/concluded)
# lives in metadata.lifecycle, not the platform `status` column.
name: thread
display: Thread
icon: threads
category: thread

schema:
  required: [title]
  optional: [parent_entity_id, metadata, tags, notes]
  # metadata commonly carries: question, lifecycle ('open' | 'parked' |
  # 'concluded'), is_default (bool — the implicit default thread),
  # open_questions (list of {id, text, status}), orient_steps,
  # question_source ('user' | 'agent'), conclude_wrap.

status_model:
  # Platform-column status. The richer thread lifecycle (open / parked
  # / concluded) lives in metadata.lifecycle today; phase 4.4 may
  # eventually unify.
  initial: active
  states: [active, archived]
  transitions:
    active: [archived]

lifecycle_model:
  # Descriptive — enforced in content/bio code today, not by the engine.
  initial: open
  states: [open, parked, concluded]
  transitions:
    open: [parked, concluded]
    parked: [open, concluded]
    concluded: [open]   # re-open is allowed (post-revision case)

allowed_edges:
  out: []
  in:  []   # threads aren't pointed at by other entities via edges;
            # membership is carried by metadata.thread_id on the members

focus:
  # Threads use a SPECIAL focus path — the manifest's thread-context
  # renderer (registered separately via register_thread_context_renderer
  # in Phase C.3) renders the per-thread firehose (pinned figures,
  # claims, open questions).
  agent_sees: [title, question, lifecycle, open_questions,
               pinned_count, claim_count, recent_outputs]

ui:
  panel: thread
  list_fields: [title, question, lifecycle]
  thumbnail: null

creation:
  rail_plus: true            # the Threads-tab "+" creates a new thread
  agent_tools: [create_thread]
  user_gestures_chat: []     # threads aren't created from chat content
  user_gestures_focus: [rename, edit_question, conclude_with_wrap]

advisors:
  on_create: []
  on_pin: []
  on_status_change: {}
