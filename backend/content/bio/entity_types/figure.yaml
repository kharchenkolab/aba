# Figure — an image produced by an analysis run or imported externally.
# The most common entity type; everything else in the curation ladder
# (Result, Claim) typically references one or more figures as evidence.
name: figure
display: Figure
icon: chart
category: leaf

# --- A. Storage + lifecycle (create-and-manage side) ---
schema:
  required: [title, artifact_path]
  # Post Cutover 4 of misc/exec_records_and_versioning.md: producing_code
  # is no longer a column. exec_id (+ artifact_kind + artifact_idx) is
  # the pointer at the exec record that owns the code.
  optional: [producing_params, parent_entity_id, scenario_of,
             metadata, tags, notes,
             exec_id, artifact_kind, artifact_idx]

status_model:
  initial: active
  states: [active, superseded, archived]
  transitions:
    active: [superseded, archived]
    # 'superseded -> active' is the non-destructive 'go back to vN'
    # path used by set_current_revision (Slice C 2026-06-11). The
    # chevron strip uses superseded as a "hidden from default view"
    # flag, not a terminal state — restoring is a normal user gesture,
    # so the transition is allowed.
    superseded: [active, archived]
    # 'restore' (archived → active) is supported by restore_entity but
    # NOT declared as a normal transition — restore is an admin action,
    # not part of the everyday lifecycle.

allowed_edges:
  # out: PROV-O upstream + variantOf (scenario clones) + supports/
  # commented_on (used as evidence/annotation target).
  # produced_by is the bio-flavoured alias for wasGeneratedBy used by
  # promote_to_result when an evidence figure links back to its parent Run.
  # wasRevisionOf: a revised figure points at the original it replaces
  # (Stage 5 of misc/exec_records_and_versioning.md).
  out: [wasGeneratedBy, produced_by, wasDerivedFrom, variantOf,
        wasRevisionOf, supports, commented_on]
  # in: Results wrap figures (includes, wasDerivedFrom, supports);
  # Findings/Claims support figures directly; variantOf is symmetric
  # (one figure points at another scenario figure).
  # wasRevisionOf incoming: an older figure is pointed at by its newer revisions.
  in:  [supports, includes, wasDerivedFrom, variantOf, wasRevisionOf]

# --- B. Navigation + shared reference frame (navigate side) ---
focus:
  # The agent's view when this figure is focused — the producing code
  # context is what makes "regenerate with X different" possible.
  # `exec_id` lets the agent's view resolve producing code via the exec
  # record (post Cutover 4). The agent doesn't read producing_code as a
  # column anymore — there isn't one.
  agent_sees: [title, artifact_path, exec_id, producing_params,
               parent_summary, advisor_notes, tags, notes]
  # Figures are the artifact: pixels and the code that made them. The
  # generic update primitive can rename + tag, but artifact_path /
  # exec_id / producing_params are produced state — to change a figure,
  # use make_revision (creates a new figure, points wasRevisionOf at
  # the original).
  agent_can_update: [title, notes, tags]

ui:
  panel: figure              # Frontend dispatch key for Phase 9 registry.
  list_fields: [title, status, parent_title]
  thumbnail: artifact_path   # the image itself is the thumbnail

# --- C. UX gestures (per-surface, descriptive) ---
creation:
  rail_plus: false           # no "+" in a rail tab creates a bare figure
  agent_tools: [run_python, run_r]   # auto-harvested from tool outputs
  user_gestures_chat: [pin]          # the chat-centric pin gesture
  user_gestures_focus: []

advisors:
  on_create: []
  # The Skeptic flags concerns when a figure is pinned/promoted into a
  # Result — pin is the moment the user signals "this matters."
  on_pin: [skeptic]
  on_status_change: {}
