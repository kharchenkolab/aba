# Table — a structured-data output of an analysis run (CSV/TSV/parquet)
# or an imported tabular result. The non-image sister of `figure`;
# treated nearly identically in curation flows.
name: table
display: Table
icon: table
category: leaf

schema:
  required: [title, artifact_path]
  optional: [producing_code, producing_params, parent_entity_id,
             scenario_of, metadata, tags, notes]

status_model:
  initial: active
  states: [active, superseded, archived]
  transitions:
    active: [superseded, archived]
    superseded: [archived]

allowed_edges:
  # produced_by mirrors figure.out — promote_to_result links evidence
  # back to its parent Run (alias of wasGeneratedBy in PROV-O terms).
  # wasRevisionOf: a revised table points at the original it replaces
  # (Stage 5 of misc/exec_records_and_versioning.md).
  out: [wasGeneratedBy, produced_by, wasDerivedFrom, wasRevisionOf,
        supports, commented_on]
  # Same membership/derivation pattern as figure — tables wrapped in Results.
  in:  [supports, includes, wasDerivedFrom, wasRevisionOf]

focus:
  agent_sees: [title, artifact_path, producing_code, parent_summary,
               tags, notes]

ui:
  panel: table
  list_fields: [title, status, parent_title]
  # Tables don't have a thumbnail — the panel renders a paginated preview.

creation:
  rail_plus: false
  agent_tools: [run_python, run_r]
  user_gestures_chat: [pin]
  user_gestures_focus: []

advisors:
  on_create: []
  on_pin: [skeptic]
  on_status_change: {}
