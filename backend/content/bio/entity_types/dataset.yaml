# Dataset — raw input the user analyzes. An uploaded file (one-file
# layout) or a folder of files (directory layout, e.g. a 10x triplet).
# Cited evidence from a collaborator (a gel, a wet-lab readout) is an
# external Result, NOT a Dataset.
name: dataset
display: Dataset
icon: data
category: leaf

schema:
  # artifact_path became OPTIONAL with the weft-native data plane
  # (misc/datasets2.md): a dataset whose bytes live in a site CAS (URL
  # fetch on a remote node) or at a remote durable home has no local
  # path — its identity is metadata.ref / metadata.home instead.
  required: [title]
  # Post Cutover 4: producing_code dropped; exec_id is the pointer
  # (rarely set on datasets — only when the dataset was registered
  # immediately after a tool call that produced it).
  optional: [artifact_path, producing_params, parent_entity_id, scenario_of,
             metadata, tags, notes,
             exec_id, artifact_kind, artifact_idx]
  # metadata commonly carries: size_bytes, file_count, layout
  # ('directory' | absent for single-file), layout_hint, original_name,
  # source, description, organism.
  # weft data plane (misc/datasets2.md): ref (DataRef), home
  # ({site, path} durable home), fingerprint (stat-level, drift
  # baseline), descriptor ({total_bytes, n_files, top}), origin_class
  # (url | run | path), source_key (semantic dedup key).

status_model:
  initial: active
  states: [active, archived]
  transitions:
    active: [archived]

allowed_edges:
  # A Dataset registered from a Run (produced_by → run); a by-reference
  # Dataset can record what it was derived from (refstore — fetched data).
  out: [produced_by, wasDerivedFrom]
  # In: an Analysis run that used this dataset (used); figures derived
  # from this dataset (registry.py: figure --wasDerivedFrom--> dataset
  # when a Run focused on a dataset produces a figure).
  in:  [used, wasDerivedFrom]

focus:
  agent_sees: [title, artifact_path, layout_hint, source, organism,
               size_bytes, file_count, description, tags, notes]
  # Metadata edits the agent can land via update_entity_fields.
  # artifact_path / size_bytes / file_count stay read-only — those
  # describe the bundle on disk and change only via add_files /
  # remove_from_dataset.
  agent_can_update: [title, notes, tags, description, source,
                     organism, layout_hint]

ui:
  panel: dataset
  list_fields: [title, file_count, size_bytes]
  thumbnail: null

creation:
  rail_plus: true            # the Datasets-tab "+" creates an empty dataset
  agent_tools: [register_dataset]
  user_gestures_chat: []     # not pinned/claimed — datasets are inputs, not curation
  user_gestures_focus: [add_files, rename]  # in the dataset focus view

advisors:
  on_create: []
  # The Explorer advisor surfaces "what's in this dataset" when a fresh
  # dataset is opened — see content/bio/advisors/runner.py.
  on_pin: []
  on_status_change: {}
  # The AdvisorStrip on the frontend kicks off /advise ~4s after focus
  # for types that opt into this. Used today by dataset (Explorer
  # surfaces what's in it) and narrative (Stylist reviews the prose).
  on_focus_auto: true

capabilities:
  by_title_storage: data_path
