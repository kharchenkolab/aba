# Bio viewer registry (viewers.md §5.1).
# Loaded at startup by content.bio.viewers; layered overlays (lab/project/
# personal) come later via the same loader. Frontend has a name → React
# component map keyed by `component:` below.

viewers:
  # ---------- entity-typed (rich app views) ----------
  - id: figure-canvas
    entity_types: [figure]
    mode: canvas
    component: FigureView
    priority: 10

  - id: result-canvas
    entity_types: [result]
    mode: canvas
    component: ResultView
    priority: 10

  - id: claim-canvas
    entity_types: [claim]
    mode: canvas
    component: ClaimView
    priority: 10

  - id: run-canvas
    entity_types: [analysis]
    mode: canvas
    component: RunView
    priority: 10

  - id: thread-canvas
    entity_types: [thread]
    mode: canvas
    component: ThreadView
    priority: 10

  - id: dataset-canvas
    entity_types: [dataset]
    mode: canvas
    component: DatasetView
    priority: 10

  # ---------- generic by MIME / extension ----------
  - id: image-canvas
    mime_patterns: [image/png, image/jpeg, image/gif, image/webp]
    extensions: [.png, .jpg, .jpeg, .gif, .webp]
    mode: canvas
    component: ImageCanvas
    priority: 5

  - id: image-modal
    mime_patterns: [image/png, image/jpeg, image/gif, image/webp]
    extensions: [.png, .jpg, .jpeg, .gif, .webp]
    mode: modal
    component: ImageModal
    priority: 3        # alternate; offered on Cmd-click

  - id: markdown-canvas
    extensions: [.md, .markdown]
    mode: canvas
    component: MarkdownCanvas
    priority: 6

  - id: code-canvas
    extensions: [.py, .R, .sh, .sql, .yaml, .yml, .ts, .tsx, .js, .jsx]
    mode: canvas
    component: CodeCanvas
    priority: 4

  - id: json-canvas
    extensions: [.json]
    mode: canvas
    component: JsonCanvas
    priority: 4

  - id: text-canvas
    mime_patterns: [text/plain]
    extensions: [.txt, .log]
    mode: canvas
    component: TextCanvas
    priority: 3

  - id: csv-table
    extensions: [.csv, .tsv]
    mode: canvas
    component: TableViewer
    priority: 5

  - id: pdf-modal
    mime_patterns: [application/pdf]
    extensions: [.pdf]
    mode: modal
    component: PdfViewer
    priority: 5

  # ---------- external launchers ----------
  # pagoda3 (single-cell explorer). Native .lstar.zarr is a zero-conversion fast
  # path; .h5ad converts on launch (lstar). See misc/pagoda3_integration.md.
  - id: pagoda3-lstar
    extensions: [.lstar.zarr, .lstar.zarr.zip]
    mode: external
    open_external: pagoda3_launcher
    priority: 9
    label: "Explore in pagoda3"

  - id: pagoda3-anndata
    extensions: [.h5ad]
    mode: external
    open_external: pagoda3_launcher
    priority: 8
    label: "Explore in pagoda3"

  # .h5mu (MuData / multimodal) — converted via the same lstar CLI (mudata pkg is
  # in the base env).
  - id: pagoda3-mudata
    extensions: [.h5mu]
    mode: external
    open_external: pagoda3_launcher
    priority: 8
    label: "Explore in pagoda3"

  # .rds — Seurat / SingleCellExperiment / pagoda2 / conos, via lstar's R bridge
  # ($LSTAR_RSCRIPT). NB: `.rds` is AMBIGUOUS — not every .rds is single-cell — so
  # a non-single-cell object fails the conversion and surfaces a clean launch error
  # (the agent's proactive offer is driven by recipe context, not this extension).
  - id: pagoda3-rds
    extensions: [.rds]
    mode: external
    open_external: pagoda3_launcher
    priority: 7
    label: "Explore in pagoda3"

  # ---------- AI viewers (deferred to V4 — registered now so the menu shows them) ----------
  - id: ai-summary
    applies: any
    mode: modal
    component: AISummaryModal
    priority: 0
    requires_consent: true
    label: "Ask Guide to summarize"

  - id: ai-visualize
    applies: any
    mode: canvas
    component: AIVisualization
    priority: 0
    requires_consent: true
    label: "Ask Guide to visualize"
