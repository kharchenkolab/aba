# system bundle — ABA built-in defaults
# Overridden by institution/lab/user bundles per the layering spec.

# Default model the primary chat agent uses when no env / config.env
# override is set. ABA_PRIMARY_MODEL / ABA_MODEL still take precedence
# per core.config.current_model_for_primary. Opus is the intended default for
# the primary chat (a subscription/API-key user gets the strongest model on
# sign-in); a lab/institution bundle can override for cost policy.
default_model: claude-opus-4-7
# Model the advisor agents (skeptic / explorer / stylist / ...) use for
# their one-shot calls. Same spirit as default_model but for advisors.
advisor_model: claude-haiku-4-5-20251001

# Primary agent spec — which spec drives the chat loop. Available in
# tree: guide (default; full prompt), grounded_guide (standard prompt +
# 100K rolling summary), lean_guide (lean prompt, smaller tool set),
# lean_qwen_guide (lean + qwen YAML model — gets overridden by ABA_MODEL
# today). See backend/content/bio/advisors/*.yaml for the individual
# spec files. ABA_PRIMARY_SPEC env still takes precedence for one-off
# operator overrides per core.runtime.agent.resolve_primary_spec_name.
primary_spec: grounded_guide

# Model catalog for the in-app model selector (Settings → LLM). Each entry maps
# a user-facing model to the agent spec it runs on. The user picks a MODEL
# per-project; the spec follows from this table. Anthropic models all run on
# grounded_guide today; a future local model can carry its own spec (e.g.
# lean_qwen_guide) by adding a row here. Institution/lab/user bundles can extend
# this list (settings.yaml lists extend across scopes).
llm_models:
  - label: Opus
    model: claude-opus-4-7
    spec: grounded_guide
    provider: anthropic
  - label: Sonnet
    model: claude-sonnet-5
    spec: grounded_guide
    provider: anthropic
  - label: Haiku
    model: claude-haiku-4-5-20251001
    spec: grounded_guide
    provider: anthropic
  # OpenAI models — used when the Agent provider is set to OpenAI (needs an OpenAI
  # key or Codex subscription in Settings → Agent). Routed through the
  # OpenAICompatibleRuntime against api.openai.com.
  # OpenAI via API KEY (api.openai.com, ChatCompletions):
  - label: GPT-4o
    model: gpt-4o
    spec: grounded_guide
    provider: openai
    via: apikey
  - label: GPT-4.1
    model: gpt-4.1
    spec: grounded_guide
    provider: openai
    via: apikey
  # OpenAI via Codex SUBSCRIPTION (chatgpt.com/backend-api/codex, Responses API).
  # These slugs are Codex-account-only + move over time (query codex/models);
  # they 400 on an API key, and gpt-4o/4.1 400 on the subscription.
  - label: "GPT-5.5 (Codex)"
    model: gpt-5.5
    spec: grounded_guide
    provider: openai
    via: subscription
  - label: "GPT-5.4 mini (Codex)"
    model: gpt-5.4-mini
    spec: grounded_guide
    provider: openai
    via: subscription
