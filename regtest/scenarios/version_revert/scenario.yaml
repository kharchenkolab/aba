id: version_revert
title: Restyle a figure several times, then go back to an old version (revision navigation)
domain: data_visualization
expected_overall:
  planted_truth: >
    DATA_DIR/expression_timecourse.csv has condition, group (control|treated),
    mean_expression, sem for an 8-point timecourse; treated rises sharply (12->25) while
    control is flat (~12-13). The figure is revised several times into a linear revision
    chain (v1 original -> v2 -> v3 -> v4). "Go back to version 2" is a NON-DESTRUCTIVE
    navigation: set_current_revision makes v2 current and marks the NEWER revisions (v3,
    v4) superseded (hidden from the chevron strip but kept on disk, fully reversible).
    Reverting must NOT delete anything.
steps:
  - id: s1
    kind: examine
    actor: agent
    prompt: What's in DATA_DIR?
    expect:
      must_mention: ["expression_timecourse"]
      checks: Lists the timecourse CSV.

  - id: s2
    kind: analyze
    actor: agent
    prompt: >
      Plot mean expression across the timecourse as a bar chart, coloured by group, with
      the SEM as error bars. Save it.
    expect:
      must_mention: ["treated", "control"]
      produces: {figure: 1}
      context: {cache_breakpoints: true}
      checks: A grouped bar chart of the timecourse with error bars (this is v1).

  - id: s3
    kind: pin
    actor: user
    target: {from_step: s2, select: figure}
    expect:
      state: {pinned_results_min: 1}
      checks: v1 is pinned as a Result.

  - id: s4
    kind: modify_figure
    actor: user
    target: {ref: s3}
    modified_code: |
      import pandas as pd, matplotlib.pyplot as plt
      d = pd.read_csv(f"{DATA_DIR}/expression_timecourse.csv")
      c = d['group'].map({'control':'#88CCEE','treated':'#CC6677'})
      fig, ax = plt.subplots(figsize=(7,4))
      ax.bar(d['condition'], d['mean_expression'], yerr=d['sem'], color=c)
      ax.set_ylabel('Mean expression'); ax.set_title('Timecourse (v2: colourblind palette)')
      plt.xticks(rotation=45, ha='right'); plt.tight_layout(); plt.savefig('timecourse.png', dpi=120)
    expect:
      checks: A restyled revision (v2, colourblind palette) is created as a child of v1.

  - id: s5
    kind: modify_figure
    actor: user
    target: {ref: s4}
    modified_code: |
      import pandas as pd, matplotlib.pyplot as plt
      d = pd.read_csv(f"{DATA_DIR}/expression_timecourse.csv")
      c = d['group'].map({'control':'#88CCEE','treated':'#CC6677'})
      fig, ax = plt.subplots(figsize=(7,4))
      ax.barh(d['condition'], d['mean_expression'], xerr=d['sem'], color=c)
      ax.set_xlabel('Mean expression'); ax.set_title('Timecourse (v3: horizontal)')
      plt.tight_layout(); plt.savefig('timecourse.png', dpi=120)
    expect:
      checks: A further revision (v3, horizontal layout) is created as a child of v2.

  - id: s6
    kind: modify_figure
    actor: user
    target: {ref: s5}
    modified_code: |
      import pandas as pd, matplotlib.pyplot as plt
      d = pd.read_csv(f"{DATA_DIR}/expression_timecourse.csv")
      c = d['group'].map({'control':'#88CCEE','treated':'#CC6677'})
      fig, ax = plt.subplots(figsize=(8,4))
      ax.bar(d['condition'], d['mean_expression'], yerr=d['sem'], color=c)
      ax.set_ylabel('Mean expression'); ax.set_title('Timecourse (v4: value labels)')
      for i, v in enumerate(d['mean_expression']): ax.text(i, v, f'{v:.0f}', ha='center', va='bottom')
      plt.xticks(rotation=45, ha='right'); plt.tight_layout(); plt.savefig('timecourse.png', dpi=120)
    expect:
      state: {revisions_min: {ref: s3, n: 3}}
      checks: A 4th revision (v4, value labels). The chain for this figure now has >=3 revisions.

  - id: s7
    kind: analyze
    actor: agent
    prompt: >
      Hmm, I've gone too far with the restyling. The colourblind-palette vertical bars
      (version 2) were the cleanest — please go back to that version.
    expect:
      must_mention: ["2"]
      must_not: ["cannot", "deleted", "start over", "lost the"]
      state: {superseded_min: 2}
      checks: >
        The agent maps "version 2" to the right revision (list_revisions) and makes it
        current (set_current_revision) — a NON-destructive navigation that marks v3+v4
        superseded. Nothing is deleted.

  - id: s8
    kind: revise
    actor: agent
    prompt: From this version, just make the y-axis start at zero and bump the title font size a little.
    expect:
      must_not: ["cannot", "no figure", "start over"]
      produces: {figure: 1}
      checks: >
        Continues editing FROM the restored v2 (a new current revision), not from the
        superseded v4 — shows revert + continue works.
