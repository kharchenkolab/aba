id: provenance_export
title: Export a reproducible bundle + check environment drift (provenance Phase 4/5)
domain: transcriptomics
expected_overall:
  planted_truth: >
    DATA_DIR/counts.csv + DATA_DIR/lengths.csv → deterministic TPM; top genes GENE0392,
    GENE0271, … export_reproduction_bundle writes a portable bundle (producing code + a pinned
    requirements lock + the provenance/exec record + README) to a directory and returns
    {bundle_dir, files}. diff_env compares the current env to the record's descriptor; on the
    SAME unchanged box there is NO drift — the agent must report "no changes / unchanged",
    NOT invent package version differences.
steps:
  - id: s1
    kind: analyze
    actor: agent
    prompt: >
      Convert DATA_DIR/counts.csv to TPM using the gene lengths in DATA_DIR/lengths.csv and show
      me the top 10 genes by mean TPM. Save a barplot.
    expect:
      must_mention: ["TPM", "GENE0392"]
      produces: {figure: 1}
      context: {cache_breakpoints: true}
      checks: Deterministic TPM; top genes correct; a barplot saved.

  - id: s2
    kind: pin
    actor: user
    target: {from_step: s1, select: figure}
    expect:
      state: {pinned_results_min: 1}
      checks: The top-genes figure is pinned.

  - id: s3
    kind: analyze
    actor: agent
    prompt: >
      I want to put this analysis in our paper's supplement so a reviewer can reproduce it
      exactly. Please export a self-contained reproducibility bundle — the exact code, the pinned
      package versions, and the provenance record.
    expect:
      tools_used: ["export_reproduction_bundle"]
      must_mention: ["bundle"]
      must_not: ["cannot export", "not possible", "as an AI"]
      checks: >
        The agent calls export_reproduction_bundle on the pinned figure and reports the bundle
        (code + pinned requirements/lock + exec record + README), not a hand-written how-to.

  - id: s4
    kind: analyze
    actor: agent
    prompt: >
      Before I submit: has the compute environment changed at all since I first ran this? Which
      packages, if any, have moved versions?
    expect:
      tools_used: ["diff_env"]
      must_not: ["upgraded to", "downgraded", "changed from version", "as an AI"]
      checks: >
        The agent calls diff_env on the analysis and reports honestly. On this unchanged box there
        is NO drift, so it should say the environment is unchanged — and must NOT fabricate
        specific package version changes.
