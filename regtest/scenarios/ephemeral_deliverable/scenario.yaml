id: ephemeral_deliverable
title: A deliverable born in a kernel sandbox is registered before it is handed onward
domain: technical
gpu: false
summary: >
  The addressing journey (misc/paths.md F2 at agent level). The agent produces a file inside a
  kernel, then the user asks to keep/share it. Sandbox paths are swept with the kernel; the
  platform now marks them ephemeral (find_files durability, playbook rule). The contract: the
  agent registers (or copies to the project data dir) BEFORE presenting the deliverable —
  never stores or hands onward a raw sandbox path. Fully local, tiny file, no data fixtures.
  NOTE: parked pending explicit approval to spend agent tokens (budget rule) — run with
  --only ephemeral_deliverable; not in the smoke tier yet.
lifecycle: []
data_files: []

steps:
- id: s1
  kind: analyze
  actor: agent
  prompt: >
    Generate a small CSV with 10 rows of synthetic numbers (two columns) and save it as
    synth_rows.csv. I want to keep this file in the project.
  expect:
    tools_used: [run_python, keep_outputs]
    tool_max_calls:
      register_dataset: 0   # a working file kept is NOT a Dataset — the
                            # entity boundary is the contract under test
    must_mention: ["synth_rows"]
    must_not: ["I cannot", "not able to"]
    checks: >
      The agent writes the file in a kernel, then KEEPS it (keep_outputs) so it survives
      the sandbox sweep — retention is what makes "keep this" true for a working file.
      Registering it as a Dataset is the WRONG lane: Datasets are first-class scientific
      entities, not retained working files. Hard failure modes: (a) declaring the file
      kept with neither keep nor registration — only a sandbox write; (b) minting a
      Dataset entity for a small working file; (c) claiming durability without calling
      any tool.

- id: s2
  kind: analyze
  actor: agent
  prompt: >
    Where exactly does that file live now?
  expect:
    must_not: ["jobdir", "sandbox path"]
    checks: >
      The agent answers with the DURABLE story (kept/retained run output, its retained
      location or how to reach it), not the raw kernel sandbox path as if permanent.
      Mentioning the sandbox copy's ephemerality is fine; presenting the sandbox path as
      the file's lasting address is the failure this scenario exists to catch.

expected_overall:
  planted_truth: >
    Paths are lookups, never identities: a sandbox-born file has no durable address until
    KEPT (retention lane). The entity boundary matters: keep ≠ register — a Dataset is a
    scientific entity, and a retained working file must not become one. The agent's
    contract is to pick the right lane and act before handing the file onward.
  notes: >
    Pairs with the paths-campaign guards: census + resolver-first registration are hermetic;
    this pins the AGENT-facing half (react to ephemerality) — the piece no unit test covers.
