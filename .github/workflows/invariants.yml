name: invariants
# Platform-modularity invariants (misc/modularity2.md §8 "columns") — enforced in
# CI so the cross-cut seams can't rot silently (misc/modularity_audit2.md, Phase 1).
on:
  push:
    branches: [main, modularity2]
  pull_request:

jobs:
  backend:
    name: backend seams + purity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: seam + platform purity (dep-free)
        run: bash scripts/check_invariants.sh   # check_seam.sh + check_platform_purity.py (stdlib-only)
      - name: access-gate + route-table snapshot
        run: |
          pip install pytest
          python -m pytest tests/test_project_pinning_coverage.py tests/test_route_table.py -q

  guards:
    # The behavioral guard suite (shared-agent-input guards, output/env unit
    # guards, runtime translation). Added 2026-07-21 after 10 days of red CI
    # hid a route-table drift AND none of the unit guards ran in CI at all.
    # Per-file execution — see scripts/run_guard_tests.sh for why.
    name: platform guard suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: install/core/environment-boot.yml
          cache-environment: true
      - name: guard tests (hermetic, per-file)
        shell: bash -el {0}
        run: |
          pip install pytest
          PYTHON=python bash scripts/run_guard_tests.sh

  frontend:
    name: frontend platform purity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npx vitest run src/platform/__platform_imports.test.ts
        working-directory: frontend
